# Lager tag og release basert på brukerinput eller automatisk versjonsøkning
# Hvis navnet settes til auto så blir den nyeste taggen funnet i repoet økt med 1 på minor versjonen
# Floating tags (vX og vX.Y) oppdateres med git push -f; nyttig i reusable workflow scenarioer.
# Canonical release-tag er alltid full semver (vX.Y.Z) i auto-modus — det er mest optimalt for GitVersion og immutable releases.
name: "Opprett tag og release"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Navn på tag (f.eks. v1.2.3)"
        required: false
        default: "auto"
      release_notes:
        description: "Utgivelsesnotater for denne taggen"
        required: false
      create_release:
        description: "Opprett en GitHub Release for denne taggen"
        required: false
        default: "true"
      floating_tags:
        description: "Opprett/oppdater floating tags (vX og vX.Y) på samme commit"
        required: false
        default: "true"
  workflow_call:
    inputs:
      tag_name:
        description: "Navn på tag (f.eks. v1.2.3)"
        type: string
        required: false
        default: "auto"
      release_notes:
        description: "Utgivelsesnotater for denne taggen"
        type: string
        required: false
      create_release:
        description: "Opprett en GitHub Release for denne taggen"
        type: string
        required: false
        default: "true"
      floating_tags:
        description: "Opprett/oppdater floating tags (vX og vX.Y) på samme commit"
        type: string
        required: false
        default: "false"
    outputs:
      tag_name:
        description: "Navn på den opprettede taggen"
        value: ${{ jobs.tag.outputs.tag_name }}

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    env:
      CREATE_FLOATING_TAGS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.floating_tags || inputs.floating_tags }}
    outputs:
      tag_name: ${{ steps.determine_tag.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Avgjør pakkeversjon og container image tag
        id: gitversion
        if: ${{ github.event.inputs.tag_name == 'auto' }}
        uses: hwinther/reusable-workflows/.github/actions/gitversion@v1

      - name: Bestem tag navn
        id: determine_tag
        run: |
          TAG_INPUT="${{ github.event.inputs.tag_name }}"

          if [ "$TAG_INPUT" == "auto" ]; then
            IFS='.' read -ra VERSION_PARTS <<< "${{ steps.gitversion.outputs.version }}"
            MAJOR=${VERSION_PARTS[0]}
            MINOR=${VERSION_PARTS[1]:-0}
            PATCH=${VERSION_PARTS[2]:-0}
            
            MINOR=$((MINOR + 1))
            PATCH=0
            
            FULL_TAG="v${MAJOR}.${MINOR}.${PATCH}"
            MINOR_TAG="v${MAJOR}.${MINOR}"
            MAJOR_TAG="v${MAJOR}"

            echo "tag_name=$FULL_TAG" >> $GITHUB_OUTPUT
            echo "tag_name_full=$FULL_TAG" >> $GITHUB_OUTPUT

            if [ "$CREATE_FLOATING_TAGS" = "true" ]; then
              echo "tag_name_minor=$MINOR_TAG" >> $GITHUB_OUTPUT
              echo "tag_name_major=$MAJOR_TAG" >> $GITHUB_OUTPUT
            else
              echo "tag_name_minor=" >> $GITHUB_OUTPUT
              echo "tag_name_major=" >> $GITHUB_OUTPUT
            fi

            echo "Ny tag (semver): $FULL_TAG"
            if [ "$CREATE_FLOATING_TAGS" = "true" ]; then
              echo "Floating tags: $MINOR_TAG, $MAJOR_TAG"
            fi
          else
            echo "tag_name=$TAG_INPUT" >> $GITHUB_OUTPUT
            echo "tag_name_full=$TAG_INPUT" >> $GITHUB_OUTPUT
            echo "Bruker angitt tag: $TAG_INPUT"
          fi

      - name: Opprett tag(er) ${{ steps.determine_tag.outputs.tag_name }}
        id: create_tag
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          FULL_TAG="${{ steps.determine_tag.outputs.tag_name_full }}"
          MINOR_TAG="${{ steps.determine_tag.outputs.tag_name_minor }}"
          MAJOR_TAG="${{ steps.determine_tag.outputs.tag_name_major }}"

          if [ -n "$FULL_TAG" ]; then
            git tag "$FULL_TAG"
            git push origin "$FULL_TAG"
          fi

          # Floating vX.Y og vX — kun når floating_tags er aktivert (krever push -f)
          if [ -n "$MINOR_TAG" ] && [ "$CREATE_FLOATING_TAGS" = "true" ]; then
            git tag -f "$MINOR_TAG"
            git push -f origin "$MINOR_TAG"
          fi
          if [ -n "$MAJOR_TAG" ] && [ "$CREATE_FLOATING_TAGS" = "true" ]; then
            git tag -f "$MAJOR_TAG"
            git push -f origin "$MAJOR_TAG"
          fi

      - name: Opprett release ${{ steps.determine_tag.outputs.tag_name }}
        id: create_release
        uses: softprops/action-gh-release@v2
        if: ${{ github.event.inputs.create_release == 'true' }}
        with:
          tag_name: ${{ steps.determine_tag.outputs.tag_name }}
          draft: false
          prerelease: false
          make_latest: true
          body: ${{ github.event.inputs.release_notes }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Vis lenke til release ${{ steps.determine_tag.outputs.tag_name }}
        if: ${{ github.event.inputs.create_release == 'true' }}
        run: |
          echo "## ✅ Release opprettet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.determine_tag.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Gå til release for gjennomgang](${{ steps.create_release.outputs.url }})" >> $GITHUB_STEP_SUMMARY
