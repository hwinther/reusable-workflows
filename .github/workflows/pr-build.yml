# Build and lint in PR - supports node and dotnet

# Node expects a package lock from npm and the following scripts: typecheck (tsc), lint:ci (eslint -f json), build (npm run build), coverage:ci (test and generate coverage report)

# Dotnet expects a solution file (sln/slnx) and: build (dotnet build)

name: "Build and lint in PR"

on:
  workflow_call:
    inputs:
      node_enabled:
        required: false
        type: boolean
        description: "Run node build and file change detection for frontend"
        default: true
      node_version:
        required: false
        type: string
        description: "Node version, e.g. 24.x"
        default: "24.x"
      node_working_directory:
        required: false
        type: string
        description: "Working directory for the build, the package.json and package-lock.json files are expected to be in this directory"
        default: "."
      node_changes_regex:
        required: false
        type: string
        description: "Regex for files to check for changes"
        default: ""
      node_scope:
        required: false
        type: string
        description: "Package scope, e.g. '@org'"
        default: ''
      dotnet_enabled:
        required: false
        type: boolean
        description: "Run dotnet build and file change detection for backend"
        default: true
      dotnet_version:
        required: false
        type: string
        description: ".NET version, e.g. 10.0.x"
        default: "10.0.x"
      dotnet_working_directory:
        required: false
        type: string
        description: Working directory for the build, the solution file is expected to be in this directory"
        default: "./"
      dotnet_solution_file:
        required: false
        type: string
        description: "Solution file to build, e.g. ProjectName.slnx, relative to dotnet_source_path"
      dotnet_changes_regex:
        required: false
        type: string
        description: "Regex for files to check for changes"
        default: ""
      dotnet_extra_nuget_source:
        required: false
        type: string
        description: "Extra NuGet source for private packages, e.g. https://pkgs.dev.azure.com/org/collection/_packaging/feed/nuget/v3/index.json"
        default: ""
      dotnet_extra_nuget_source_name:
        required: false
        type: string
        description: "Name of the extra NuGet source, e.g. 'feed'"
        default: ""

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    outputs:
      node_changes: ${{ steps.node-check.outputs.changes_detected || 'false' }}
      dotnet_changes: ${{ steps.dotnet-check.outputs.changes_detected || 'false' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set comparison base
        id: set-base
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "Comparing with PR base branch (${{ github.event.pull_request.base.ref }}): ${{ github.event.pull_request.base.sha }}"
          else
            git fetch origin main
            echo "base_ref=origin/main" >> $GITHUB_OUTPUT
            echo "Comparing with main branch"
          fi

      - name: Check for frontend changes
        id: node-check
        if: ${{ inputs.node_enabled }}
        run: |
          if [ -z "${{ inputs.node_changes_regex }}" ]; then
            PATTERN="^${{ inputs.node_working_directory }}/"
          else
            PATTERN="${{ inputs.node_changes_regex }}"
          fi
          
          echo "Using regex pattern: $PATTERN"
          echo "Files to check against:"
          git diff --name-only ${{ steps.set-base.outputs.base_ref }}...HEAD
          
          if git diff --name-only ${{ steps.set-base.outputs.base_ref }}...HEAD | grep -qE "$PATTERN"; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Changes detected in pattern."
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "No changes detected in pattern."
          fi

      - name: Check for backend changes
        id: dotnet-check
        if: ${{ inputs.dotnet_enabled }}
        run: |
          if [ -z "${{ inputs.dotnet_changes_regex }}" ]; then
            PATTERN="^${{ inputs.dotnet_working_directory }}/"
          else
            PATTERN="${{ inputs.dotnet_changes_regex }}"
          fi

          echo "Using regex pattern: $PATTERN"
          echo "Files to check against:"
          git diff --name-only ${{ steps.set-base.outputs.base_ref }}...HEAD

          if git diff --name-only ${{ steps.set-base.outputs.base_ref }}...HEAD | grep -qE "$PATTERN"; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Changes detected in pattern."
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "No changes detected in pattern."
          fi
          
  node-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.node_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build node
        id: node-build
        uses: hwinther/reusable-workflows/.github/actions/node-build@refactor/matrix
        with:
          node_version: ${{ inputs.node_version }}
          working_directory: ${{ inputs.node_working_directory }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          scope: ${{ inputs.node_scope }}

      - name: "Create or update PR comment for node"
        uses: im-open/update-pr-comment@v1.2.2
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-identifier: "build-results-node"
          comment-content: ${{ steps.node-build.outputs.pr-comment }}

  dotnet-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.dotnet_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build dotnet
        id: dotnet-build
        uses: hwinther/reusable-workflows/.github/actions/dotnet-build@refactor/matrix
        with:
          dotnet_version: ${{ inputs.dotnet_version }}
          working_directory: ${{ inputs.dotnet_working_directory }}
          solution_file: ${{ inputs.dotnet_solution_file }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nuget_source: ${{ inputs.dotnet_extra_nuget_source }}
          extra_nuget_source_name: ${{ inputs.dotnet_extra_nuget_source_name }}

      - name: "Create or update PR comment for dotnet"
        uses: im-open/update-pr-comment@v1.2.2
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-identifier: "build-results-dotnet"
          comment-content: ${{ steps.dotnet-build.outputs.pr-comment }}

  pr-build:
    needs: [detect-changes, node-build, dotnet-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write change check status to summary
        run: |
          echo "## Change checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Changes detected | Build result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------------------|--------------|" >> $GITHUB_STEP_SUMMARY
          NODE_RESULT="${{ needs.node-build.result }}"
          DOTNET_RESULT="${{ needs.dotnet-build.result }}"
          # Derive "changes detected" from whether the build ran (outputs can be empty when jobs are skipped + always())
          if [ "$NODE_RESULT" = "skipped" ]; then
            NODE_STATUS="No"
            NODE_BUILD="— (skipped)"
          else
            NODE_STATUS="✅ Yes"
            NODE_BUILD="$([ \"$NODE_RESULT\" = 'success' ] && echo '✅ Success' || echo \"❌ $NODE_RESULT\")"
          fi
          if [ "$DOTNET_RESULT" = "skipped" ]; then
            DOTNET_STATUS="No"
            DOTNET_BUILD="— (skipped)"
          else
            DOTNET_STATUS="✅ Yes"
            DOTNET_BUILD="$([ \"$DOTNET_RESULT\" = 'success' ] && echo '✅ Success' || echo \"❌ $DOTNET_RESULT\")"
          fi
          echo "| Node (frontend) | $NODE_STATUS | $NODE_BUILD |" >> $GITHUB_STEP_SUMMARY
          echo "| Dotnet (backend) | $DOTNET_STATUS | $DOTNET_BUILD |" >> $GITHUB_STEP_SUMMARY

      - name: Check build status
        run: |
          NODE_RESULT="${{ needs.node-build.result }}"
          DOTNET_RESULT="${{ needs.dotnet-build.result }}"

          if [ "$NODE_RESULT" = "skipped" ] && [ "$DOTNET_RESULT" = "skipped" ]; then
            echo "✅ No relevant changes found for build or lint."
            exit 0
          fi

          FAILED=0
          if [ "$NODE_RESULT" != "skipped" ] && [ "$NODE_RESULT" != "success" ]; then
            echo "❌ Node build failed or did not run."
            FAILED=1
          fi
          if [ "$DOTNET_RESULT" != "skipped" ] && [ "$DOTNET_RESULT" != "success" ]; then
            echo "❌ Dotnet build failed or did not run."
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "✅ All relevant builds succeeded."
          exit 0

      - name: "Create or update PR comment (no relevant changes)"
        uses: im-open/update-pr-comment@v1.2.2
        if: github.event_name == 'pull_request' && needs.node-build.result == 'skipped' && needs.dotnet-build.result == 'skipped'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-identifier: "build-results"
          comment-content: "## ✅ No relevant changes found for build or lint."
