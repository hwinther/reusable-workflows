# Bygg og lint i PR - støtter node og dotnet

# Node forutsetter at man har package lock laget av npm og at følgende script finnes:
# typecheck (tsc), lint:ci (eslint -f json), build (npm run build) og coverage:ci (test og generere kode dekningsrapport)

# Dotnet forutsetter at man har en løsningsfil (sln/slnx) og at følgende script finnes:
# build (dotnet build)

name: "Bygg og lint i PR"

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        description: "Node versjon, f.eks. 24.x"
        default: "24.x"
      node_source_path:
        required: false
        type: string
        description: "Mappen der for eksempel frontend koden ligger, for eksempel 'frontend'"
        default: "."
      node_changes_regex:
        required: false
        type: string
        description: "Regulært uttrykk for filer som skal sjekkes for endringer"
        default: ""
      node_scope:
          required: false
          type: string
          description: "Scope for pakker, f.eks. '@organisasjon'"
          default: ''
      dotnet_version:
        required: false
        type: string
        description: ".NET versjon, f.eks. 10.0.x"
        default: "10.0.x"
      dotnet_source_path:
        required: false
        type: string
        description: "Mappen der for eksempel backend koden ligger"
        default: "./"
      dotnet_solution_file:
        required: false
        type: string
        description: "Løsningsfilen som skal bygges, f.eks. ProsjektNavn.slnx, relativt til dotnet_source_path"
      dotnet_changes_regex:
        required: false
        type: string
        description: "Regulært uttrykk for filer som skal sjekkes for endringer"
        default: ""
      dotnet_extra_nuget_source:
        required: false
        type: string
        description: "Ekstra NuGet kilde for private pakker, f.eks. https://pkgs.dev.azure.com/organisasjon/samling/_packaging/samling/nuget/v3/index.json"
        default: ""
      dotnet_extra_nuget_source_name:
        required: false
        type: string
        description: "Navn på den ekstra NuGet kilden, f.eks. 'samling'"
        default: ""

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    outputs:
      node_changes: ${{ steps.node-check.outputs.changes_detected }}
      dotnet_changes: ${{ steps.dotnet-check.outputs.changes_detected }}
    steps:
      - name: Hent kode
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sjekk om frontend har endringer
        id: node-check
        run: |
          if [ -z "${{ inputs.node_changes_regex }}" ]; then
            PATTERN="^${{ inputs.node_source_path }}/"
          else
            PATTERN="${{ inputs.node_changes_regex }}"
          fi
          
          echo "Bruker det regulære uttrykket: $PATTERN"
          echo "For å se om noen av disse filene passer:"
          git diff --name-only HEAD^ HEAD
          
          if git diff --name-only HEAD^ HEAD | grep -qE "$PATTERN"; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Endringer oppdaget i mønsteret."
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "Ingen endringer oppdaget i mønsteret."
          fi

      - name: Sjekk om backend har endringer
        id: dotnet-check
        run: |
          if [ -z "${{ inputs.dotnet_changes_regex }}" ]; then
            PATTERN="^${{ inputs.dotnet_source_path }}/"
          else
            PATTERN="${{ inputs.dotnet_changes_regex }}"
          fi

          echo "Bruker det regulære uttrykket: $PATTERN"
          echo "For å se om noen av disse filene passer:"
          git diff --name-only HEAD^ HEAD

          if git diff --name-only HEAD^ HEAD | grep -qE "$PATTERN"; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Endringer oppdaget i mønsteret."
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "Ingen endringer oppdaget i mønsteret."
          fi

  node-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.node_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Hent kode
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bygg node
        id: node-build
        uses: hwinther/reusable-workflows/.github/actions/node-build@refactor/matrix
        with:
          node_version: ${{ inputs.node_version }}
          node_source_path: ${{ inputs.node_source_path }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          scope: ${{ inputs.node_scope }}

      - name: "Opprett eller oppdater PR-kommentar for node"
        uses: im-open/update-pr-comment@v1.2.2
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-identifier: "build-results-node"
          comment-content: ${{ steps.node-build.outputs.pr-comment }}

  dotnet-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.dotnet_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Hent kode
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bygg dotnet
        id: dotnet-build
        uses: hwinther/reusable-workflows/.github/actions/dotnet-build@refactor/matrix
        with:
          dotnet_version: ${{ inputs.dotnet_version }}
          source_path: ${{ inputs.dotnet_source_path }}
          solution_file: ${{ inputs.dotnet_solution_file }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nuget_source: ${{ inputs.dotnet_extra_nuget_source }}
          extra_nuget_source_name: ${{ inputs.dotnet_extra_nuget_source_name }}

      - name: "Opprett eller oppdater PR-kommentar for dotnet"
        uses: im-open/update-pr-comment@v1.2.2
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-identifier: "build-results-dotnet"
          comment-content: ${{ steps.dotnet-build.outputs.pr-comment }}

  pr-build:
    needs: [detect-changes, node-build, dotnet-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk build-status
        run: |
          NODE_CHANGES="${{ needs.detect-changes.outputs.node_changes }}"
          DOTNET_CHANGES="${{ needs.detect-changes.outputs.dotnet_changes }}"
          NODE_RESULT="${{ needs.node-build.result }}"
          DOTNET_RESULT="${{ needs.dotnet-build.result }}"

          if [ "$NODE_CHANGES" != "true" ] && [ "$DOTNET_CHANGES" != "true" ]; then
            echo "✅ Ingen relevante endringer funnet for bygging eller linting."
            exit 0
          fi

          FAILED=0
          if [ "$NODE_CHANGES" == "true" ] && [ "$NODE_RESULT" != "success" ]; then
            echo "❌ Node-build feilet eller ble ikke kjørt."
            FAILED=1
          fi
          if [ "$DOTNET_CHANGES" == "true" ] && [ "$DOTNET_RESULT" != "success" ]; then
            echo "❌ Dotnet-build feilet eller ble ikke kjørt."
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "✅ Alle relevante builds var vellykkede."
          exit 0

      - name: "Opprett eller oppdater PR-kommentar (ingen relevante endringer)"
        uses: im-open/update-pr-comment@v1.2.2
        if: github.event_name == 'pull_request' && needs.detect-changes.outputs.node_changes != 'true' && needs.detect-changes.outputs.dotnet_changes != 'true'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-identifier: "build-results"
          comment-content: "## ✅ Ingen relevante endringer funnet for bygging eller linting."
