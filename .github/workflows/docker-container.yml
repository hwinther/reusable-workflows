name: "Publish docker container to GHCR"

on:
  workflow_call:
    inputs:
      container_registry:
        description: "Container registry, e.g. ghcr.io"
        default: "ghcr.io"
        type: string
      container_image_name_postfix:
        description: "Container image name postfix, e.g. frontend"
        required: true
        type: string
      build_context:
        description: "Docker build context, e.g. frontend or ."
        required: true
        type: string
      dockerfile:
        description: "Dockerfile path, e.g. frontend/Dockerfile"
        required: true
        type: string
      override_config:
        description: "Override config"
        required: false
        type: string
        default: ""
      platforms:
        description: "Comma-separated buildx platforms (e.g. 'linux/amd64' or 'linux/amd64,linux/arm64'). Multi-value triggers QEMU setup and a manifest-list push."
        required: false
        type: string
        default: "linux/amd64"
      build_args:
        description: "Newline-separated KEY=VALUE build args, appended after APP_VERSION and GIT_SHA. Use this to pass digest-pinned base image refs for chaining (e.g. SDR_BASE_RUNTIME=ghcr.io/owner/repo/sdr-base@sha256:…)."
        required: false
        type: string
        default: ""
      additional_tags:
        description: "Semicolon-separated tag-only strings (no registry, no name) to add alongside gitversion's tags. Each becomes ${registry}/${repo}/${postfix}:${tag}."
        required: false
        type: string
        default: ""
      use_gitversion_tags:
        description: "When false, skip gitversion-derived tag computation and use only additional_tags. gitversion still runs to populate version / is_alpha."
        required: false
        type: boolean
        default: true
      scan_all_platforms:
        description: "When true, build each non-native arch in `platforms` separately with --load and run Grype against it (distinct SARIF category per arch). When false (default), only the runner-native arch is scanned."
        required: false
        type: boolean
        default: false
      grype_scan_enabled:
        description: "Run Anchore Grype vulnerability scan before push (SBOM is still generated)"
        required: false
        type: boolean
        default: true
      grype_severity_cutoff:
        description: "Grype severity-cutoff (fail on this level and above): negligible, low, medium, high, critical"
        required: false
        type: string
        default: high
      grype_only_fixed:
        description: "Grype only-fixed: only report (and fail on) vulnerabilities that have a fix available"
        required: false
        type: boolean
        default: true
      grype_fail_build:
        description: "Grype fail-build: fail the job when vulnerabilities meet severity-cutoff (false = report/SARIF only)"
        required: false
        type: boolean
        default: true
      cosign_sign_enabled:
        description: "Sign the pushed image digest with cosign (keyless / GitHub OIDC); signatures are stored in the registry. Installs Cosign CLI v2.4.3 (cosign-installer cosign-release) so attestations use legacy sha256-….att registry manifests compatible with Kyverno 1.17 verifyImages; Cosign v3+ prefers OCI referrers, which that fetch path does not resolve."
        required: false
        type: boolean
        default: true
      cosign_supply_chain_attest_enabled:
        description: "After push, attach Cosign CycloneDX SBOM and Grype vuln attestations for Kyverno verifyImages (GitHub SLSA/build provenance is separate via attest-build-provenance). Requires cosign_sign_enabled and job permissions id-token:write and attestations:write. Relies on the Cosign v2.x pin so attestations publish as .att manifests, not referrers-only (Cosign v3+)."
        required: false
        type: boolean
        default: true
    outputs:
      container_image_tags:
        description: "Full image refs pushed (registry/name:tag, comma-separated). Includes any additional_tags."
        value: ${{ jobs['build-and-push'].outputs.container_tags }}
      image_digest:
        description: "OCI manifest digest for the pushed image (sha256:...). For multi-arch this is the manifest-list digest."
        value: ${{ jobs['build-and-push'].outputs.image_digest }}
      version:
        description: "GitVersion-derived version string."
        value: ${{ jobs.gitversion.outputs.version }}
      is_alpha:
        description: "Whether the build is from a feature/bugfix branch (string 'true'/'false')."
        value: ${{ jobs.gitversion.outputs.is_alpha }}

jobs:
  prepare-repository-name:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      repository: ${{ steps.lower-repo.outputs.repository }}
    steps:
      - id: lower-repo
        run: |
          echo "repository=${GITHUB_REPOSITORY@L}" >> $GITHUB_OUTPUT

  gitversion:
    needs: prepare-repository-name
    permissions:
      contents: read
    uses: hwinther/reusable-workflows/.github/workflows/gitversion.yml@v1
    with:
      container_registry: ${{ inputs.container_registry }}
      container_image_name: ${{ needs.prepare-repository-name.outputs.repository }}/${{ inputs.container_image_name_postfix }}
      override_config: ${{ inputs.override_config }}

  build-and-push:
    name: Build and push (${{ inputs.container_image_name_postfix }})
    needs: [prepare-repository-name, gitversion]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: write
      security-events: write
      pull-requests: write  # for the Grype findings PR comment via _grype-summary
    outputs:
      image_digest: ${{ steps.push.outputs.image_digest }}
      container_tags: ${{ steps.tags.outputs.container_tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.container_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create docker metadata
        id: docker-metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ needs.prepare-repository-name.outputs.repository }}/${{ inputs.container_image_name_postfix }}

      - name: Compose final container tags
        id: tags
        shell: bash
        env:
          GITVERSION_TAGS: ${{ needs.gitversion.outputs.container_image_tags }}
          ADDITIONAL_TAGS: ${{ inputs.additional_tags }}
          USE_GITVERSION: ${{ inputs.use_gitversion_tags }}
          REGISTRY: ${{ inputs.container_registry }}
          REPO: ${{ needs.prepare-repository-name.outputs.repository }}
          POSTFIX: ${{ inputs.container_image_name_postfix }}
        run: |
          set -euo pipefail
          final_tags=""
          if [ "$USE_GITVERSION" = "true" ]; then
            final_tags="$GITVERSION_TAGS"
          fi
          if [ -n "$ADDITIONAL_TAGS" ]; then
            while IFS= read -r t; do
              t=$(echo "$t" | xargs)
              [ -z "$t" ] && continue
              full_ref="${REGISTRY}/${REPO}/${POSTFIX}:${t}"
              if [ -z "$final_tags" ]; then
                final_tags="$full_ref"
              else
                final_tags="${final_tags},${full_ref}"
              fi
            done < <(echo "$ADDITIONAL_TAGS" | tr ';' '\n')
          fi
          [ -n "$final_tags" ] || { echo "::error::No container tags resolved (use_gitversion_tags=$USE_GITVERSION, additional_tags='$ADDITIONAL_TAGS')"; exit 1; }
          echo "container_tags=$final_tags" >> "$GITHUB_OUTPUT"
          echo "Final container tags:"
          echo "$final_tags" | tr ',' '\n' | sed 's/^/  /'

      - name: Build container for native scan (linux/amd64, load locally)
        id: build-amd64
        uses: hwinther/reusable-workflows/.github/actions/_build-image-docker@v1
        with:
          build_context: ${{ inputs.build_context }}
          dockerfile: ${{ inputs.dockerfile }}
          tags: ${{ steps.tags.outputs.container_tags }}
          app_version: ${{ needs.gitversion.outputs.version }}
          git_sha: ${{ github.sha }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          platforms: linux/amd64
          build_args: ${{ inputs.build_args }}

      - name: Generate SBOM and scan with Grype (amd64)
        id: scan-amd64
        uses: hwinther/reusable-workflows/.github/actions/_scan-image@v1
        with:
          image_ref: ${{ steps.build-amd64.outputs.local_ref }}
          container_image_name_postfix: ${{ inputs.container_image_name_postfix }}
          arch_suffix: ${{ (inputs.scan_all_platforms && contains(inputs.platforms, ',')) && 'amd64' || '' }}
          grype_scan_enabled: ${{ inputs.grype_scan_enabled }}
          grype_severity_cutoff: ${{ inputs.grype_severity_cutoff }}
          grype_only_fixed: ${{ inputs.grype_only_fixed }}
          grype_fail_build: ${{ inputs.grype_fail_build }}
          cosign_supply_chain_attest_enabled: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container for arm64 scan (load locally under QEMU)
        id: build-arm64
        if: ${{ inputs.scan_all_platforms && contains(inputs.platforms, 'linux/arm64') }}
        uses: hwinther/reusable-workflows/.github/actions/_build-image-docker@v1
        with:
          build_context: ${{ inputs.build_context }}
          dockerfile: ${{ inputs.dockerfile }}
          tags: ${{ steps.tags.outputs.container_tags }}
          app_version: ${{ needs.gitversion.outputs.version }}
          git_sha: ${{ github.sha }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          platforms: linux/arm64
          build_args: ${{ inputs.build_args }}

      - name: Generate SBOM and scan with Grype (arm64)
        id: scan-arm64
        if: ${{ inputs.scan_all_platforms && contains(inputs.platforms, 'linux/arm64') }}
        uses: hwinther/reusable-workflows/.github/actions/_scan-image@v1
        with:
          image_ref: ${{ steps.build-arm64.outputs.local_ref }}
          container_image_name_postfix: ${{ inputs.container_image_name_postfix }}
          arch_suffix: arm64
          grype_scan_enabled: ${{ inputs.grype_scan_enabled }}
          grype_severity_cutoff: ${{ inputs.grype_severity_cutoff }}
          grype_only_fixed: ${{ inputs.grype_only_fixed }}
          grype_fail_build: ${{ inputs.grype_fail_build }}
          cosign_supply_chain_attest_enabled: false  # cosign predicate uses native-arch SBOM only in this iteration
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image and attach signatures + attestations
        id: push
        uses: hwinther/reusable-workflows/.github/actions/_push-image-with-signatures@v1
        with:
          image_ref: ${{ steps.build-amd64.outputs.local_ref }}
          container_tags: ${{ steps.tags.outputs.container_tags }}
          container_registry: ${{ inputs.container_registry }}
          repository: ${{ needs.prepare-repository-name.outputs.repository }}
          container_image_name_postfix: ${{ inputs.container_image_name_postfix }}
          cosign_sign_enabled: ${{ inputs.cosign_sign_enabled }}
          cosign_supply_chain_attest_enabled: ${{ inputs.cosign_supply_chain_attest_enabled }}
          sbom_cyclonedx_path: ${{ steps.scan-amd64.outputs.sbom_cyclonedx_path }}
          grype_json_path: ${{ steps.scan-amd64.outputs.grype_json_path }}
          version: ${{ needs.gitversion.outputs.version }}
          platforms: ${{ inputs.platforms }}
          build_context: ${{ inputs.build_context }}
          dockerfile: ${{ inputs.dockerfile }}
          build_args: ${{ inputs.build_args }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          git_sha: ${{ github.sha }}

      - name: Job summary
        env:
          CONTAINER_TAGS: ${{ steps.tags.outputs.container_tags }}
          IMAGE_REF: ${{ inputs.container_registry }}/${{ needs.prepare-repository-name.outputs.repository }}/${{ inputs.container_image_name_postfix }}@${{ steps.push.outputs.image_digest }}
          COSIGN_CERT_IDENTITY: https://github.com/${{ github.workflow_ref }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          IMAGE_DIGEST: ${{ steps.push.outputs.image_digest }}
          APP_VERSION: ${{ needs.gitversion.outputs.version }}
          GIT_SHA: ${{ github.sha }}
          PLATFORMS: ${{ inputs.platforms }}
          COSIGN_SUPPLY_CHAIN_ATTEST: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled }}
        run: |
          echo "### 📦 Container image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Platforms: \`${PLATFORMS}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following tags were pushed to the registry:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$CONTAINER_TAGS" | tr ',' '\n' | while read -r tag; do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            echo "- [\`${tag}\`](https://${tag})" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image digest: \`${IMAGE_DIGEST}\`" >> $GITHUB_STEP_SUMMARY
          echo "Build args: \`APP_VERSION=${APP_VERSION}\`, \`GIT_SHA=${GIT_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Verify digest, signature, and attestation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "GHCR may list several manifests in one package (image, cosign \`sha256-…\` signature tags, build attestations). They refer to the **same** image identity via digest:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Immutable reference: \`${IMAGE_REF}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**cosign** (keyless: the certificate identifies **this reusable workflow**, not the consumer repo. Pin consumers with \`uses: …/docker-container.yml@v1\` so verification can target \`@refs/tags/v1\`.):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- This run: \`${WORKFLOW_REF}\` → identity \`${COSIGN_CERT_IDENTITY}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Verify **this exact run** (authenticate to GHCR if prompted):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
          echo "cosign verify --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" --certificate-identity \"${COSIGN_CERT_IDENTITY}\" \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Policy-style verify when consumers use the floating **v1** tag (any org/repo hosting this workflow):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
          echo "cosign verify --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" --certificate-identity-regexp '^https://github.com/[^/]+/[^/]+/\\.github/workflows/docker-container\\.yml@refs/tags/v1\$' \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If verification fails, add \`--verbose\` and align \`--certificate-identity\` / \`-regexp\` with the \`Issued certificate\` line." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${COSIGN_SUPPLY_CHAIN_ATTEST}" = "true" ]; then
            echo "**Cosign supply-chain attestations** (CycloneDX SBOM + Grype vuln, e.g. for Kyverno \`verifyImages\` / \`validate\`):" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "List signature and attestation layers (authenticate to GHCR if prompted):" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
            echo "cosign tree \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Verify attestations with the **same** certificate identity as \`cosign verify\` above:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
            echo "cosign verify-attestation --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" --certificate-identity \"${COSIGN_CERT_IDENTITY}\" --type cyclonedx \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
            echo "cosign verify-attestation --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" --certificate-identity \"${COSIGN_CERT_IDENTITY}\" --type vuln \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "With a floating **v1** workflow pin, use \`--certificate-identity-regexp\` the same way as for \`cosign verify\` (see \`.github/workflows/docker-container.yml\` job summary source for the pattern)." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "**GitHub artifact attestation** (subject is this digest):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
          echo "gh attestation verify oci://${IMAGE_REF} --repo ${GITHUB_REPOSITORY}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If \`gh\` errors with \`PKIX_ED25519\` / trusted root / Sigstore, upgrade the GitHub CLI to the latest release (older \`gh\` builds cannot load the current Sigstore trust bundle)." >> "$GITHUB_STEP_SUMMARY"
