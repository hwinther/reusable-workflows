name: "Playwright E2E against locally-loaded container images"

# Reusable e2e workflow that downloads pre-built image artifacts (from
# build-and-scan-{docker,dotnet}.yml jobs in the same run), loads them into
# the local Docker daemon, runs Playwright via docker-compose against them,
# captures logs and reports, and posts a sticky PR comment with the result
# summary. The caller's docker-compose file references images via env vars
# (e.g. ${API_IMAGE}); this workflow sets those env vars to the loaded
# refs before `docker compose up`.

on:
  workflow_call:
    inputs:
      compose_file:
        description: "Path to docker-compose file in the consumer repo (e.g. docker-compose.e2e.yml)."
        required: true
        type: string
      playwright_working_directory:
        description: "Directory containing package.json / playwright config."
        required: false
        type: string
        default: "."
      node_version:
        description: "Node version, e.g. 24.x"
        required: false
        type: string
        default: "24.x"
      playwright_browsers:
        description: "Browsers to install for Playwright, e.g. 'chromium' or 'chromium firefox'."
        required: false
        type: string
        default: "chromium"
      playwright_install_command:
        description: "Command to install npm deps in playwright_working_directory."
        required: false
        type: string
        default: "npm ci"
      playwright_run_command:
        description: "Command to run Playwright in playwright_working_directory."
        required: false
        type: string
        default: "npx playwright test"
      image_artifacts_json:
        description: |
          JSON object mapping docker-compose env var names to workflow artifact names produced by
          build-and-scan-{docker,dotnet}.yml. Each artifact is downloaded and `docker load`ed; the
          env var is set to the loaded image ref before `docker compose up`. Example:
          {"API_IMAGE":"build-and-scan-api-image","FRONTEND_IMAGE":"build-and-scan-frontend-image"}
        required: true
        type: string
      report_paths_json:
        description: "JSON array of paths (relative to playwright_working_directory) to upload as the playwright-report artifact."
        required: false
        type: string
        default: '["playwright-report","test-results"]'
      coverage_paths_json:
        description: "JSON array of paths (relative to playwright_working_directory) to upload as the e2e-coverage artifact. Empty array = skip."
        required: false
        type: string
        default: '[]'
      comment_identifier:
        description: "Sticky PR comment identifier passed to im-open/update-pr-comment."
        required: false
        type: string
        default: "e2e-results"
      compose_up_timeout_seconds:
        description: "Timeout for `docker compose up --wait` (seconds)."
        required: false
        type: number
        default: 180
      pr_comment_enabled:
        description: "Post a PR comment with the Playwright summary on pull_request events."
        required: false
        type: boolean
        default: true
      results_json_path:
        description: "Path to Playwright JSON report (relative to playwright_working_directory). Used to build the PR comment."
        required: false
        type: string
        default: "playwright-report/results.json"
      artifact_retention_days:
        description: "Retention for the playwright-report and e2e-coverage artifacts."
        required: false
        type: number
        default: 14

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GHCR (for base-image and side-car pulls)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.playwright_working_directory }}/package-lock.json

      - name: Install npm dependencies
        shell: bash
        working-directory: ${{ inputs.playwright_working_directory }}
        env:
          INSTALL_CMD: ${{ inputs.playwright_install_command }}
        run: |
          set -euo pipefail
          eval "$INSTALL_CMD"

      - name: Install Playwright browsers
        shell: bash
        working-directory: ${{ inputs.playwright_working_directory }}
        env:
          BROWSERS: ${{ inputs.playwright_browsers }}
        run: npx playwright install --with-deps $BROWSERS

      - name: Download image artifacts and load into local Docker daemon
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_ARTIFACTS_JSON: ${{ inputs.image_artifacts_json }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          download_dir="${RUNNER_TEMP}/e2e-images"
          mkdir -p "$download_dir"
          # Iterate JSON entries: { "<ENV_VAR>": "<artifact_name>", ... }
          while IFS=$'\t' read -r env_var artifact_name; do
            [ -z "$env_var" ] || [ -z "$artifact_name" ] && continue
            target="$download_dir/$artifact_name"
            mkdir -p "$target"
            echo "Downloading artifact $artifact_name -> $target"
            gh run download "$RUN_ID" --name "$artifact_name" --dir "$target"
            archive=$(find "$target" -maxdepth 2 -type f \( -name '*.tar.gz' -o -name '*.tar' \) | head -1)
            [ -n "$archive" ] || { echo "::error::No tar(.gz) found inside artifact $artifact_name"; ls -la "$target"; exit 1; }
            if [ "${archive##*.}" = "gz" ]; then
              loaded=$(gunzip -c "$archive" | docker load | sed -n 's/^Loaded image: //p' | head -1)
            else
              loaded=$(docker load -i "$archive" | sed -n 's/^Loaded image: //p' | head -1)
            fi
            [ -n "$loaded" ] || { echo "::error::docker load produced no image for $artifact_name"; exit 1; }
            echo "${env_var}=${loaded}" >> "$GITHUB_ENV"
            echo "Set ${env_var}=${loaded}"
          done < <(echo "$IMAGE_ARTIFACTS_JSON" | jq -r 'to_entries[] | "\(.key)\t\(.value)"')

      - name: Pull non-artifact compose images
        shell: bash
        env:
          COMPOSE_FILE: ${{ inputs.compose_file }}
        run: |
          # Pull external services (postgres, redis, etc.); ignore failures for
          # services backed by locally-loaded images that aren't in the registry.
          docker compose -f "$COMPOSE_FILE" pull --ignore-pull-failures || true

      - name: Start compose stack
        shell: bash
        env:
          COMPOSE_FILE: ${{ inputs.compose_file }}
          COMPOSE_TIMEOUT: ${{ inputs.compose_up_timeout_seconds }}
        run: |
          docker compose -f "$COMPOSE_FILE" up -d --wait --wait-timeout "$COMPOSE_TIMEOUT"

      - name: Run Playwright
        shell: bash
        working-directory: ${{ inputs.playwright_working_directory }}
        env:
          CI: "true"
          RUN_CMD: ${{ inputs.playwright_run_command }}
        run: |
          set -euo pipefail
          eval "$RUN_CMD"

      - name: Capture compose logs
        if: always()
        shell: bash
        env:
          COMPOSE_FILE: ${{ inputs.compose_file }}
        run: |
          docker compose -f "$COMPOSE_FILE" logs --no-color > "${RUNNER_TEMP}/compose-logs.txt" || true

      - name: Build PR comment from Playwright report
        id: e2e-comment
        if: ${{ always() && github.event_name == 'pull_request' && inputs.pr_comment_enabled }}
        shell: bash
        env:
          REPORT_JSON: ${{ inputs.playwright_working_directory }}/${{ inputs.results_json_path }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          out=/tmp/comment.md
          if [ ! -f "$REPORT_JSON" ]; then
            {
              echo "### 🎭 Playwright E2E"
              echo
              echo "The Playwright run did not produce a report — check the [workflow logs](${RUN_URL}) for setup or compose failures."
            } > "$out"
          else
            passed=$(jq -r '.stats.expected // 0' "$REPORT_JSON")
            failed=$(jq -r '.stats.unexpected // 0' "$REPORT_JSON")
            flaky=$(jq -r '.stats.flaky // 0' "$REPORT_JSON")
            skipped=$(jq -r '.stats.skipped // 0' "$REPORT_JSON")
            duration_ms=$(jq -r '.stats.duration // 0' "$REPORT_JSON")
            duration=$(awk -v ms="$duration_ms" 'BEGIN { s=int(ms/1000); m=int(s/60); s=s%60; printf "%dm %ds", m, s }')
            total=$((passed + failed + flaky + skipped))
            if [ "$failed" -eq 0 ]; then
              header="✅ All tests passed"
            else
              header="❌ ${failed} test(s) failed"
            fi
            {
              echo "### 🎭 Playwright E2E — ${header}"
              echo
              echo "| Result | Count |"
              echo "|--------|------:|"
              echo "| ✅ Passed | ${passed} |"
              echo "| ❌ Failed | ${failed} |"
              echo "| ⚠️ Flaky | ${flaky} |"
              echo "| ⏭️ Skipped | ${skipped} |"
              echo "| **Total** | **${total}** |"
              echo
              echo "Duration: ${duration}"
              echo
              if [ "$failed" -gt 0 ] || [ "$flaky" -gt 0 ]; then
                echo "<details><summary>Failed and flaky tests</summary>"
                echo
                jq -r '
                  [ .suites[] | recurse(.suites[]?) | .specs[]? as $s
                    | $s.tests[]
                    | select(.status != "expected" and .status != "skipped")
                    | "- `\($s.file // "")` — \($s.title) [\(.projectName // "")] (\(.status))"
                  ] | unique[]
                ' "$REPORT_JSON"
                echo
                echo "</details>"
                echo
              fi
              echo "Full report and traces: [download the \`playwright-report\` artifact](${RUN_URL}#artifacts)."
            } > "$out"
          fi
          {
            echo "comment<<__EOM__"
            cat "$out"
            echo "__EOM__"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: ${{ always() && github.event_name == 'pull_request' && inputs.pr_comment_enabled }}
        uses: im-open/update-pr-comment@b782531000dfcf02162c0bd9e78639d82a13c3b5 # v1.2.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-identifier: ${{ inputs.comment_identifier }}
          comment-content: ${{ steps.e2e-comment.outputs.comment }}

      - name: Resolve report and coverage paths
        id: resolve-paths
        if: always()
        shell: bash
        env:
          WD: ${{ inputs.playwright_working_directory }}
          REPORT_PATHS_JSON: ${{ inputs.report_paths_json }}
          COVERAGE_PATHS_JSON: ${{ inputs.coverage_paths_json }}
        run: |
          set -euo pipefail
          # Render JSON arrays as newline-separated paths, prefixed with playwright_working_directory.
          REPORT_PATHS=$(echo "$REPORT_PATHS_JSON" | jq -r --arg wd "$WD" '.[] | "\($wd)/\(.)"')
          COVERAGE_PATHS=$(echo "$COVERAGE_PATHS_JSON" | jq -r --arg wd "$WD" '.[] | "\($wd)/\(.)"')
          # Always include the captured compose logs in the report artifact.
          REPORT_PATHS_WITH_LOGS=$(printf '%s\n%s' "$REPORT_PATHS" "${RUNNER_TEMP}/compose-logs.txt")
          {
            echo "report_paths<<__EOP__"
            echo "$REPORT_PATHS_WITH_LOGS"
            echo "__EOP__"
            echo "coverage_paths<<__EOC__"
            echo "$COVERAGE_PATHS"
            echo "__EOC__"
            if [ -n "$COVERAGE_PATHS" ]; then
              echo "has_coverage=true"
            else
              echo "has_coverage=false"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Upload Playwright report and compose logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: ${{ steps.resolve-paths.outputs.report_paths }}
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: warn

      - name: Upload e2e coverage
        if: ${{ always() && steps.resolve-paths.outputs.has_coverage == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-coverage
          path: ${{ steps.resolve-paths.outputs.coverage_paths }}
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: warn

      - name: Tear down compose stack
        if: always()
        shell: bash
        env:
          COMPOSE_FILE: ${{ inputs.compose_file }}
        run: |
          docker compose -f "$COMPOSE_FILE" down -v
