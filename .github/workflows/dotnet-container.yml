name: "Publish backend container to GHCR"

on:
  workflow_call:
    inputs:
      dotnet_version:
        description: ".NET version, e.g. 10.0.x"
        required: true
        type: string
      solution_path:
        description: "Solution path, e.g. backend"
        required: true
        type: string
      solution_file:
        description: "Solution file, e.g. ProjectName.slnx"
        required: true
        type: string
      project_file:
        description: "Project file, e.g. src/Api/Api.csproj"
        required: true
        type: string
      cache_enabled:
        description: "Enable NuGet package caching, requires dotnet lockfiles to be in use"
        required: false
        type: boolean
        default: true
      container_registry:
        description: "Container registry, e.g. ghcr.io"
        required: true
        type: string
      container_image_name_postfix:
        description: "Container image name postfix, e.g. api"
        required: true
        type: string
      override_config:
        description: "Override config"
        required: false
        type: string
        default: ""
      grype_scan_enabled:
        description: "Run Anchore Grype vulnerability scan before push (SBOM is still generated)"
        required: false
        type: boolean
        default: true
      grype_severity_cutoff:
        description: "Grype severity-cutoff (fail on this level and above): negligible, low, medium, high, critical"
        required: false
        type: string
        default: high
      grype_only_fixed:
        description: "Grype only-fixed: only report (and fail on) vulnerabilities that have a fix available"
        required: false
        type: boolean
        default: true
      grype_fail_build:
        description: "Grype fail-build: fail the job when vulnerabilities meet severity-cutoff (false = report/SARIF only)"
        required: false
        type: boolean
        default: true
      cosign_sign_enabled:
        description: "Sign the pushed image digest with cosign (keyless / GitHub OIDC); signatures are stored in the registry. Installs Cosign CLI v2.4.3 (cosign-installer cosign-release) so attestations use legacy sha256-….att registry manifests compatible with Kyverno 1.17 verifyImages; Cosign v3+ prefers OCI referrers, which that fetch path does not resolve."
        required: false
        type: boolean
        default: true
      cosign_supply_chain_attest_enabled:
        description: "After push, attach Cosign CycloneDX SBOM and Grype vuln attestations for Kyverno verifyImages (GitHub SLSA/build provenance is separate via attest-build-provenance). Requires cosign_sign_enabled and job permissions id-token:write and attestations:write. Relies on the Cosign v2.x pin so attestations publish as .att manifests, not referrers-only (Cosign v3+)."
        required: false
        type: boolean
        default: true
    outputs:
      container_image_tags:
        description: "Full image refs pushed (registry/name:tag, comma-separated)"
        value: ${{ jobs.gitversion.outputs.container_image_tags }}
      image_digest:
        description: "OCI manifest digest for the pushed image (sha256:...)"
        value: ${{ jobs['build-and-push'].outputs.image_digest }}

jobs:
  prepare-repository-name:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      repository: ${{ steps.lower-repo.outputs.repository }}
    steps:
      - id: lower-repo
        run: |
          echo "repository=${GITHUB_REPOSITORY@L}" >> $GITHUB_OUTPUT

  gitversion:
    needs: prepare-repository-name
    permissions:
      contents: read
    uses: hwinther/reusable-workflows/.github/workflows/gitversion.yml@v1
    with:
      container_registry: ${{ inputs.container_registry }}
      container_image_name: ${{ needs.prepare-repository-name.outputs.repository }}/${{ inputs.container_image_name_postfix }}
      override_config: ${{ inputs.override_config }}

  build-and-push:
    name: Build and push (${{ needs.gitversion.outputs.container_image_tags }})
    needs: [prepare-repository-name, gitversion]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: write
      security-events: write
    outputs:
      image_digest: ${{ steps.image-digest.outputs.digest }}
    defaults:
      run:
        working-directory: ${{ inputs.solution_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet_version }}
          cache: ${{ inputs.cache_enabled }}
          cache-dependency-path: "${{ inputs.solution_path }}/**/packages.lock.json"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.container_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Restore
        run: dotnet restore --locked-mode ${{ inputs.solution_file }}

      - name: Publish container to archive (scan gate, no registry push)
        env:
          ContainerImageTags: ${{ needs.gitversion.outputs.image_tags }}
        run: |
          dotnet publish ${{ inputs.project_file }} \
            -c Release \
            --no-restore \
            -t:PublishContainer \
            -p:ContainerArchiveOutputPath=${{ runner.temp }}/container-image.tar.gz \
            -p:ContainerRepository=${{ needs.prepare-repository-name.outputs.repository }}/${{ inputs.container_image_name_postfix }} \
            -p:ContainerVersion=${{ needs.gitversion.outputs.version }} \
            -p:InformationalVersion=${{ needs.gitversion.outputs.version }} \
            -p:SourceRevisionId=${{ github.sha }} \
            -p:PublishRepositoryUrl=true \
            -p:RepositoryUrl=${{ github.server_url }}/${{ github.repository }}.git

      - name: Load image from archive (local only until scan passes)
        id: load-image
        env:
          ARCHIVE: ${{ runner.temp }}/container-image.tar.gz
        run: |
          set -euo pipefail
          mapfile -t loaded < <(docker load -i "$ARCHIVE" | sed -n 's/^Loaded image: //p')
          [ "${#loaded[@]}" -ge 1 ] || { echo "::error::docker load produced no image lines"; exit 1; }
          echo "ref=${loaded[0]}" >> $GITHUB_OUTPUT

      - name: Generate SBOM for container image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.load-image.outputs.ref }}
          format: spdx-json
          output-file: ${{ runner.temp }}/container-image.spdx.json
          artifact-name: container-image.spdx.json

      - name: Generate CycloneDX SBOM for cosign attestation
        if: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.load-image.outputs.ref }}
          format: cyclonedx-json
          output-file: ${{ runner.temp }}/container-image.cyclonedx.json
          artifact-name: container-image.cyclonedx.json

      - name: Vulnerability scan (Grype)
        id: grype-scan
        if: ${{ inputs.grype_scan_enabled }}
        continue-on-error: true
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: ${{ runner.temp }}/container-image.spdx.json
          output-format: sarif
          output-file: ${{ runner.temp }}/grype-results.sarif
          severity-cutoff: ${{ inputs.grype_severity_cutoff }}
          only-fixed: ${{ inputs.grype_only_fixed }}
          fail-build: ${{ inputs.grype_fail_build }}

      - name: Upload Grype SARIF to Code Scanning
        if: ${{ always() && inputs.grype_scan_enabled && steps.grype-scan.outcome != 'skipped' }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ${{ runner.temp }}/grype-results.sarif
          category: grype-container-${{ inputs.container_image_name_postfix }}
          wait-for-processing: false

      - name: Grype Code Scanning link (job summary)
        if: ${{ always() && inputs.grype_scan_enabled && steps.grype-scan.outcome != 'skipped' }}
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          IMAGE_POSTFIX: ${{ inputs.container_image_name_postfix }}
        run: |
          ENC=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote_plus('is:open branch:' + os.environ['BRANCH'] + ' '))")
          URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/security/code-scanning?query=${ENC}"
          {
            echo "### Grype / Code scanning"
            echo ""
            echo "[View open code scanning alerts for branch \`${BRANCH}\`](${URL})"
            echo ""
            echo "Uploaded SARIF category: \`grype-container-${IMAGE_POSTFIX}\`. Alerts can take a short time to appear after upload."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Grype vulnerability gate
        if: ${{ inputs.grype_scan_enabled && inputs.grype_fail_build && steps.grype-scan.outcome == 'failure' }}
        env:
          IMAGE_POSTFIX: ${{ inputs.container_image_name_postfix }}
        run: |
          echo "::error::Grype reported vulnerabilities at or above the configured severity cutoff. See Code Scanning (category grype-container-${IMAGE_POSTFIX}) or the Grype step log."
          exit 1

      - name: Download Grype (JSON report for cosign vuln attestation)
        id: grype-for-attest
        if: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled && inputs.grype_scan_enabled }}
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0 (same ref as scan-action)

      - name: Grype JSON for cosign vuln attestation
        if: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled && inputs.grype_scan_enabled }}
        run: |
          set -euo pipefail
          "${{ steps.grype-for-attest.outputs.cmd }}" "sbom:${{ runner.temp }}/container-image.spdx.json" -o json > "${{ runner.temp }}/grype-cosign-vuln.json"

      - name: Grype JSON only (supply chain attestation, no SARIF gate)
        if: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled && !inputs.grype_scan_enabled }}
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: ${{ runner.temp }}/container-image.spdx.json
          output-format: json
          output-file: ${{ runner.temp }}/grype-cosign-vuln.json
          severity-cutoff: negligible
          only-fixed: false
          fail-build: false

      - name: Tag for GHCR and push
        env:
          CONTAINER_TAGS: ${{ needs.gitversion.outputs.container_image_tags }}
          SRC: ${{ steps.load-image.outputs.ref }}
        run: |
          set -euo pipefail
          echo "$CONTAINER_TAGS" | tr ',' '\n' | while read -r dest; do
            dest=$(echo "$dest" | xargs)
            [ -z "$dest" ] && continue
            docker tag "$SRC" "$dest"
            docker push "$dest"
          done

      - name: Resolve pushed image digest
        id: image-digest
        run: |
          REF="${{ needs.gitversion.outputs.deploy_tag }}"
          DIGEST=$(docker buildx imagetools inspect "$REF" | awk '/^Digest:[[:space:]]+/ {print $2; exit}')
          [ -n "$DIGEST" ] || { echo "::error::Failed to resolve image digest for $REF"; exit 1; }
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ needs.prepare-repository-name.outputs.repository }}/${{ inputs.container_image_name_postfix }}
          subject-digest: ${{ steps.image-digest.outputs.digest }}
          push-to-registry: true

      # Kyverno 1.17 resolves Cosign attestations like Cosign v2 (sha256-….att manifest tags). Cosign v3+ often publishes via OCI referrers only → 404 on that path while local cosign v3 verify still works via /referrers/.
      - name: Install Cosign
        if: ${{ inputs.cosign_sign_enabled }}
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.4.3

      - name: Sign container image (cosign, keyless)
        if: ${{ inputs.cosign_sign_enabled }}
        env:
          DIGEST: ${{ steps.image-digest.outputs.digest }}
          CONTAINER_TAGS: ${{ needs.gitversion.outputs.container_image_tags }}
        run: |
          set -euo pipefail
          images=""
          while IFS= read -r tag; do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            if [ -z "$images" ]; then
              images="${tag}@${DIGEST}"
            else
              images="${images} ${tag}@${DIGEST}"
            fi
          done < <(echo "$CONTAINER_TAGS" | tr ',' '\n')
          [ -n "$images" ] || { echo "::error::No image refs to sign"; exit 1; }
          echo "Signing images: ${images}"
          cosign sign --yes ${images}

      - name: Build cosign vuln attestation predicate
        if: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled }}
        env:
          RUN_URI: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          GRYPE_JSON="${{ runner.temp }}/grype-cosign-vuln.json"
          [ -f "$GRYPE_JSON" ] || { echo "::error::Missing $GRYPE_JSON (Grype JSON for vuln attestation)"; exit 1; }
          STARTED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          FINISHED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --slurpfile result "$GRYPE_JSON" \
            --arg run_uri "$RUN_URI" \
            --arg run_id "${{ github.run_id }}" \
            --arg started "$STARTED" \
            --arg finished "$FINISHED" \
            '{
              invocation: {
                parameters: ["sbom"],
                uri: $run_uri,
                event_id: $run_id,
                "builder.id": "https://github.com/actions/runner"
              },
              scanner: {
                uri: "https://github.com/anchore/grype",
                version: "anchore/scan-action@v7",
                db: {uri: "", version: ""},
                result: $result[0]
              },
              metadata: {
                scanStartedOn: $started,
                scanFinishedOn: $finished
              }
            }' > "${{ runner.temp }}/cosign-vuln-predicate.json"

      - name: Cosign attest CycloneDX and vulnerability scan (registry)
        if: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled }}
        env:
          IMAGE_REF: ${{ inputs.container_registry }}/${{ needs.prepare-repository-name.outputs.repository }}/${{ inputs.container_image_name_postfix }}@${{ steps.image-digest.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --yes --type cyclonedx --predicate "${{ runner.temp }}/container-image.cyclonedx.json" "$IMAGE_REF"
          cosign attest --yes --type vuln --predicate "${{ runner.temp }}/cosign-vuln-predicate.json" "$IMAGE_REF"

      - name: Job summary
        env:
          CONTAINER_TAGS: ${{ needs.gitversion.outputs.container_image_tags }}
          IMAGE_REF: ${{ inputs.container_registry }}/${{ needs.prepare-repository-name.outputs.repository }}/${{ inputs.container_image_name_postfix }}@${{ steps.image-digest.outputs.digest }}
          COSIGN_CERT_IDENTITY: https://github.com/${{ github.workflow_ref }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          IMAGE_DIGEST: ${{ steps.image-digest.outputs.digest }}
          APP_VERSION: ${{ needs.gitversion.outputs.version }}
          GIT_SHA: ${{ github.sha }}
          COSIGN_SUPPLY_CHAIN_ATTEST: ${{ inputs.cosign_sign_enabled && inputs.cosign_supply_chain_attest_enabled }}
        run: |
          echo "### 📦 Container image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following tags were pushed to the registry:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$CONTAINER_TAGS" | tr ',' '\n' | while read -r tag; do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            echo "- [\`${tag}\`](https://${tag})" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image digest: \`${IMAGE_DIGEST}\`" >> $GITHUB_STEP_SUMMARY
          echo "Publish properties: \`ContainerVersion\` / \`InformationalVersion\` = \`${APP_VERSION}\`, \`SourceRevisionId\` = \`${GIT_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Verify digest, signature, and attestation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "GHCR may list several manifests in one package (image, cosign \`sha256-…\` signature tags, build attestations). They refer to the **same** image identity via digest:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Immutable reference: \`${IMAGE_REF}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**cosign** (keyless: the certificate identifies **this reusable workflow**, not the consumer repo. Pin consumers with \`uses: …/dotnet-container.yml@v1\` so verification can target \`@refs/tags/v1\`.):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- This run: \`${WORKFLOW_REF}\` → identity \`${COSIGN_CERT_IDENTITY}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Verify **this exact run** (authenticate to GHCR if prompted):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
          echo "cosign verify --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" --certificate-identity \"${COSIGN_CERT_IDENTITY}\" \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Policy-style verify when consumers use the floating **v1** tag (any org/repo hosting this workflow):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
          echo "cosign verify --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" --certificate-identity-regexp '^https://github.com/[^/]+/[^/]+/\\.github/workflows/dotnet-container\\.yml@refs/tags/v1\$' \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If verification fails, add \`--verbose\` and align \`--certificate-identity\` / \`-regexp\` with the \`Issued certificate\` line." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${COSIGN_SUPPLY_CHAIN_ATTEST}" = "true" ]; then
            echo "**Cosign supply-chain attestations** (CycloneDX SBOM + Grype vuln, e.g. for Kyverno \`verifyImages\` / \`validate\`):" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "List signature and attestation layers (authenticate to GHCR if prompted):" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
            echo "cosign tree \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Verify attestations with the **same** certificate identity as \`cosign verify\` above:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
            echo "cosign verify-attestation --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" --certificate-identity \"${COSIGN_CERT_IDENTITY}\" --type cyclonedx \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
            echo "cosign verify-attestation --certificate-oidc-issuer \"https://token.actions.githubusercontent.com\" --certificate-identity \"${COSIGN_CERT_IDENTITY}\" --type vuln \"${IMAGE_REF}\"" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "With a floating **v1** workflow pin, use \`--certificate-identity-regexp\` the same way as for \`cosign verify\` (see \`.github/workflows/dotnet-container.yml\` job summary source for the pattern)." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "**GitHub artifact attestation** (subject is this digest):" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`shell" >> "$GITHUB_STEP_SUMMARY"
          echo "gh attestation verify oci://${IMAGE_REF} --repo ${GITHUB_REPOSITORY}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "If \`gh\` errors with \`PKIX_ED25519\` / trusted root / Sigstore, upgrade the GitHub CLI to the latest release (older \`gh\` builds cannot load the current Sigstore trust bundle)." >> "$GITHUB_STEP_SUMMARY"
