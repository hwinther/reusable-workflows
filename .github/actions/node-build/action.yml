name: "NPM Build"
description: "Frontend (node/npm) typesjekk, build og linting"
branding:
  icon: 'table'
  color: 'black'

inputs:
  node_version:
    required: true
    description: "Node versjon"
  node_source_path:
    required: true
    description: "Mappen der node koden ligger"
  github_token:
    required: true
    description: "GitHub token for å få tilgang til private npm pakker"
  scope:
    required: false 
    description: "Scope for pakken, f.eks. '@organisasjon'"
    default: ''

outputs:
  pr-comment:
    description: "Kombinert PR kommentar med byggstatus"
    value: ${{ steps.pr-comment-combiner.outputs.result }}

runs:
  using: "composite"
  steps:
  - uses: actions/setup-node@v4
    name: Sett opp Node
    with:
      node-version: ${{ inputs.node_version }}
      cache: "npm"
      cache-dependency-path: "${{ inputs.node_source_path }}/package-lock.json"
      scope: ${{ inputs.scope }}

  - name: Legger til GitHub token i .npmrc
    working-directory: ${{ inputs.node_source_path }}
    shell: bash
    run: touch ./.npmrc && echo -e "\n//npm.pkg.github.com/:_authToken=${{ inputs.github_token }}" >> ./.npmrc

  - name: Installer avhengigheter
    id: dependency-install
    shell: bash
    working-directory: ${{ inputs.node_source_path }}
    run: |
      # Create temporary directory for output files
      TEMP_DIR=$(mktemp -d)
      echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

      echo "::group::Installer avhengigheter"
      set +e
      npm ci 1>$TEMP_DIR/dependency.out 2>&1
      exit_code=$?
      echo "Dependency installation exit code: $exit_code"
      set -e

      echo -e "\nInstallasjon av avhengigheter:\n"
      cat $TEMP_DIR/dependency.out

      if [[ $exit_code -ne 0 ]]
      then
        echo "::error::Installasjon av avhengigheter feilet."
        echo "## ❌ Installasjon av avhengigheter feilet:" > $TEMP_DIR/dependency.md
        cat $TEMP_DIR/dependency.out >> $TEMP_DIR/dependency.md
        exit 1
      else
        echo "## ✅ Installasjon av avhengigheter vellykket" > $TEMP_DIR/dependency.md
        cat $TEMP_DIR/dependency.out | grep "packages in" >> $TEMP_DIR/dependency.md
      fi
      echo "::endgroup::"

  - name: Tilbakestiller .npmrc
    working-directory: ${{ inputs.node_source_path }}
    shell: bash
    run: |
      if git ls-files --error-unmatch .npmrc > /dev/null 2>&1; then
        git checkout HEAD -- .npmrc
      else
        rm -f .npmrc || true
      fi

  - name: Typecheck
    id: node-typecheck
    if: steps.dependency-install.outcome == 'success'
    shell: bash
    working-directory: ${{ inputs.node_source_path }}
    env:
      NODE_DISABLE_COLORS: 1
    run: |
      echo "::group::Typecheck"
      set +e
      npm run typecheck 1>$TEMP_DIR/typecheck.out 2>&1 || (exit 0)
      TYPECHECK_EXIT_CODE=$?
      echo "Typecheck exit code: $TYPECHECK_EXIT_CODE"
      set -e

      echo -e "\nTypecheck-resultat:\n"
      cat $TEMP_DIR/typecheck.out

      sed 's/\x1b\[[0-9;]*m//g' $TEMP_DIR/typecheck.out > $TEMP_DIR/typecheck.out.nocolor
      echo -e "\nTypecheck-resultat uten farger:\n"
      cat $TEMP_DIR/typecheck.out.nocolor

      # Extract errors from typecheck output - support multiple error formats

      # Format 1: TypeScript new format: file:line:column - error message
      grep -E ".+:[0-9]+:[0-9]+ - error " $TEMP_DIR/typecheck.out.nocolor > $TEMP_DIR/typecheck.err.ts_new || (exit 0)

      # Format 2: TypeScript old format: file(line,column): error message
      grep "): error " $TEMP_DIR/typecheck.out.nocolor > $TEMP_DIR/typecheck.err.ts_old || (exit 0)

      # Format 3: Generic errors: Error: ...
      grep -E "Error: " $TEMP_DIR/typecheck.out.nocolor > $TEMP_DIR/typecheck.err.generic || (exit 0)

      # Combine all error formats
      cat $TEMP_DIR/typecheck.err.ts_new $TEMP_DIR/typecheck.err.ts_old $TEMP_DIR/typecheck.err.generic > $TEMP_DIR/typecheck.err 2>/dev/null || (exit 0)

      echo -e "\nEkstraherte typecheck-feil:\n"
      cat $TEMP_DIR/typecheck.err

      if [ ! -s $TEMP_DIR/typecheck.err ]
      then
        echo "## ✅ Typecheck vellykket" > $TEMP_DIR/typecheck.md
      else
        # Process all error formats
        cat $TEMP_DIR/typecheck.err | while read line
        do
          # Format 1: TypeScript new format: file:line:column - error message
          ts_new_regex="(.+):([0-9]+):[0-9]+ - error (.+)"
          
          # Format 2: TypeScript old format: file(line,column): error message
          ts_old_regex="(.+)\(([0-9]+),[0-9]+\): error (.+)"
          
          # Format 3: Generic error: Error: ...
          generic_error_regex="Error: (.+)"
          
          if [[ $line =~ $ts_new_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[3]}"
          elif [[ $line =~ $ts_old_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[3]}"
          elif [[ $line =~ $generic_error_regex ]]; then
            # For generic errors, we don't create GitHub annotations since we don't have file/line info
            # The error will still appear in the markdown output below
            :
          fi
        done

        cp $TEMP_DIR/typecheck.err $TEMP_DIR/typecheck.md
        sed -i '/^$/d' $TEMP_DIR/typecheck.md             # removes empty lines
        sed -i -e 's/^/- ❌ /' $TEMP_DIR/typecheck.md     # prefix with markdown list item and cross mark emoji
        echo "## ❌ Følgende typecheck-feil bør fikses:" | cat - $TEMP_DIR/typecheck.md > $TEMP_DIR/typecheck.md.temp && mv $TEMP_DIR/typecheck.md.temp $TEMP_DIR/typecheck.md
      fi

      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/typecheck.md)"$'\n'EOF >> $GITHUB_OUTPUT

      if [ -s $TEMP_DIR/typecheck.err ]
      then
        echo "::endgroup::"
        echo "❌ Typecheck feilet"
        exit 1
      fi
      echo "::endgroup::"
      echo "✅ Typecheck vellykket"

  - name: Bygg
    id: node-build
    if: steps.dependency-install.outcome == 'success'
    shell: bash
    working-directory: ${{ inputs.node_source_path }}
    env:
      NODE_DISABLE_COLORS: 1
    run: |
      echo "::group::Bygg"
      npm run build 1>$TEMP_DIR/build.out 2>&1 || (exit 0)
      echo -e "\nByggresultat:\n"
      cat $TEMP_DIR/build.out

      sed 's/\x1b\[[0-9;]*m//g' $TEMP_DIR/build.out > $TEMP_DIR/build.out.nocolor
      echo -e "\nByggresultat uten farger:\n"
      cat $TEMP_DIR/build.out.nocolor

      # Extract errors from build output - support multiple error formats

      # Format 1: TypeScript new format: file:line:column - error message
      grep -E ".+:[0-9]+:[0-9]+ - error " $TEMP_DIR/build.out.nocolor > $TEMP_DIR/build.err.ts_new || (exit 0)

      # Format 2: TypeScript old format: file(line,column): error message
      grep "): error " $TEMP_DIR/build.out.nocolor > $TEMP_DIR/build.err.ts_old || (exit 0)

      # Format 3: Generic errors: Error: ...
      grep -E "Error: " $TEMP_DIR/build.out.nocolor > $TEMP_DIR/build.err.generic || (exit 0)

      # Combine all error formats
      cat $TEMP_DIR/build.err.ts_new $TEMP_DIR/build.err.ts_old $TEMP_DIR/build.err.generic > $TEMP_DIR/build.err 2>/dev/null || (exit 0)

      echo -e "\nEkstraherte byggfeil:\n"
      cat $TEMP_DIR/build.err

      if [ ! -s $TEMP_DIR/build.err ]
      then
        echo "## ✅ Bygg vellykket" > $TEMP_DIR/build.md
      else
        # Process all error formats
        cat $TEMP_DIR/build.err | while read line
        do
          # Format 1: TypeScript new format: file:line:column - error message
          ts_new_regex="(.+):([0-9]+):[0-9]+ - error (.+)"
          
          # Format 2: TypeScript old format: file(line,column): error message
          ts_old_regex="(.+)\(([0-9]+),[0-9]+\): error (.+)"
          
          # Format 3: Generic error: Error: ...
          generic_error_regex="Error: (.+)"
          
          if [[ $line =~ $ts_new_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[3]}"
          elif [[ $line =~ $ts_old_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[3]}"
          elif [[ $line =~ $generic_error_regex ]]; then
            # For generic errors, we don't create GitHub annotations since we don't have file/line info
            # The error will still appear in the markdown output below
            :
          fi
        done

        cp $TEMP_DIR/build.err $TEMP_DIR/build.md
        sed -i '/^$/d' $TEMP_DIR/build.md             # removes empty lines
        sed -i -e 's/^/- ❌ /' $TEMP_DIR/build.md     # prefix with markdown list item and cross mark emoji
        echo "## ❌ Følgende byggfeil bør fikses:" | cat - $TEMP_DIR/build.md > $TEMP_DIR/build.md.temp && mv $TEMP_DIR/build.md.temp $TEMP_DIR/build.md
      fi

      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/build.md)"$'\n'EOF >> $GITHUB_OUTPUT

      if [ -s $TEMP_DIR/build.err ]
      then
        echo "::endgroup::"
        echo "❌ Bygg feilet"
        exit 1
      fi
      echo "::endgroup::"
      echo "✅ Bygg vellykket"

  - name: Lint
    if: steps.dependency-install.outcome == 'success'
    id: node-lint
    shell: bash
    working-directory: ${{ inputs.node_source_path }}
    env:
      WORKFLOW_AGENT_PATH: "${{ github.workspace }}/"
    run: |
      echo "::group::Lint"
      set +e
      npm run lint:ci 1>$TEMP_DIR/lint.out 2>$TEMP_DIR/lint.err || (exit 0)
      LINT_EXIT_CODE=$?
      echo "Lint exit code: $LINT_EXIT_CODE"
      set -e

      echo -e "\nLint-resultat:\n"
      cat $TEMP_DIR/lint.out

      LINT_FAILED=0

      # Check if there were errors during linting process
      if [ -s $TEMP_DIR/lint.err ]
      then
        echo -e "\nFeil under linting:\n"
        cat $TEMP_DIR/lint.err
        echo "::error::Feil under linting, se output over."
        echo "## ❌ Feil under linting:" > $TEMP_DIR/lint.md
        cat $TEMP_DIR/lint.err >> $TEMP_DIR/lint.md
        LINT_FAILED=1
      else
        if [ ! -s $TEMP_DIR/lint.out ] || [ "$(cat $TEMP_DIR/lint.out)" = "[]" ]
        then
          echo "## ✅ Ingen lint-problemer 🎊" > $TEMP_DIR/lint.md
        else
          # Check if there are any actual lint errors/warnings
          cat $TEMP_DIR/lint.out | grep "\[" > $TEMP_DIR/lint.out.json
          ERROR_COUNT=$(jq '[.[] | select(.errorCount > 0 or .warningCount > 0)] | length' $TEMP_DIR/lint.out.json 2>/dev/null || echo "0")
          
          if [ "$ERROR_COUNT" = "0" ]
          then
            echo "## ✅ Ingen lint-problemer 🎊" > $TEMP_DIR/lint.md
          else
            # Parse JSON and create GitHub error annotations
            echo "## ❌ Følgende lint-problemer bør fikses:" > $TEMP_DIR/lint.md
            LINT_FAILED=1
            
            # Use jq to parse JSON and create annotations
            if command -v jq >/dev/null 2>&1; then
              # Create GitHub error annotations
              jq -r '.[] | select(.messages | length > 0) | .filePath as $file | .messages[] | "::error file=" + ($file | sub("${{ env.WORKFLOW_AGENT_PATH }}"; "")) + ",line=" + (.line | tostring) + ",col=" + (.column | tostring) + "::" + .message + " (\(.ruleId // "unknown"))"' $TEMP_DIR/lint.out.json 2>/dev/null || true
              
              # Create markdown output for PR comment
              jq -r '.[] | select(.messages | length > 0) | .filePath as $file | .messages[] | "- ❌ " + ($file | sub("${{ env.WORKFLOW_AGENT_PATH }}"; "") | sub(".*/"; "")) + ":" + (.line | tostring) + ":" + (.column | tostring) + " - " + .message + " (\(.ruleId // "unknown"))"' $TEMP_DIR/lint.out.json >> $TEMP_DIR/lint.md 2>/dev/null || true
            else
              # Fallback if jq is not available
              echo "jq not available, showing raw JSON output" >> $TEMP_DIR/lint.md
              cat $TEMP_DIR/lint.out >> $TEMP_DIR/lint.md
            fi
          fi
        fi
      fi

      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/lint.md)"$'\n'EOF >> $GITHUB_OUTPUT

      # Final check - fail the step if any lint issues were found
      if [ "$LINT_FAILED" = "1" ]
      then
        echo "::endgroup::"
        echo "::error::Lint-problemer funnet"
        exit 1
      fi

      echo "::endgroup::"
      echo "✅ Ingen lint feil funnet"

  - name: Kjør tester
    id: test-coverage
    shell: bash
    working-directory: ${{ inputs.node_source_path }}
    run: npm run coverage:ci

  - name: Test reporter
    uses: dorny/test-reporter@v2
    id: test-reporter
    with:
      name: "Node tester"
      working-directory: ${{ inputs.node_source_path }}
      path: "${{ inputs.node_source_path }}/coverage/junit-report.xml"
      reporter: jest-junit
      fail-on-error: false

  - name: Code Coverage Report
    uses: irongut/CodeCoverageSummary@v1.3.0
    with:
      filename: "${{ inputs.node_source_path }}/coverage/cobertura-coverage.xml"
      badge: true
      fail_below_min: false
      format: markdown
      hide_branch_rate: false
      hide_complexity: true
      indicators: true
      output: both
      thresholds: "60 80"

  - name: Create Todo Comments
    uses: gkampitakis/github-action-todo-commenter@v1
    if: always()
    with:
      github-token: ${{ inputs.github_token }}
      review-message: "Please take a look :eyes:"
      tags: "TODO:,FIXME:,BUG:"

  - name: Ser etter endringer som ikke er sjekket inn
    shell: bash
    working-directory: ${{ inputs.node_source_path }}
    run: |
      echo "Ser etter endringer som ikke er sjekket inn..."
      git status --porcelain
      if [ -n "$(git status --porcelain)" ]; then
        echo "::error::Endringer i filer etter restore og build:"
        git status
        git diff
        echo "## ❌ Endringer i filer etter restore og build" > $TEMP_DIR/git-status.md
        echo "" >> $TEMP_DIR/git-status.md
        echo "Følgende filer har endringer:" >> $TEMP_DIR/git-status.md
        echo "\`\`\`" >> $TEMP_DIR/git-status.md
        git status --porcelain >> $TEMP_DIR/git-status.md
        echo "\`\`\`" >> $TEMP_DIR/git-status.md
        exit 1
      else
        echo "Ingen endringer i filer etter restore og build ble funnet."
        echo "## ✅ Ingen endringer i filer etter restore og build ble funnet" > $TEMP_DIR/git-status.md
      fi

  - name: Kombiner utdata til en PR-kommentar
    id: pr-comment-combiner
    if: always()
    shell: bash
    working-directory: ${{ inputs.node_source_path }}
    run: |
      echo "# Byggstatus node (${{ inputs.node_source_path }})" > $TEMP_DIR/combined.md
      cat $TEMP_DIR/dependency.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/typecheck.md ] && cat $TEMP_DIR/typecheck.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/build.md ] && cat $TEMP_DIR/build.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/lint.md ] && cat $TEMP_DIR/lint.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/test-coverage.md ] && cat $TEMP_DIR/test-coverage.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/git-status.md ] && cat $TEMP_DIR/git-status.md >> $TEMP_DIR/combined.md
      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/combined.md)"$'\n'EOF >> $GITHUB_OUTPUT
      cat $TEMP_DIR/combined.md >> $GITHUB_STEP_SUMMARY
