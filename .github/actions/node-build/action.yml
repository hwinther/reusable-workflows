name: "NPM Build"
description: "Frontend (node/npm) typecheck, build and linting"

inputs:
  node_version:
    required: true
    description: "Node version"
  working_directory:
    required: true
    description: "Working directory for the build, the package.json and package-lock.json files are expected to be in this directory"
  github_token:
    required: true
    description: "GitHub token for access to private npm packages"
  scope:
    required: false 
    description: "Package scope, e.g. '@org'"
    default: ''
  extra_command:
    required: false
    description: "Extra command to run after node build"
    default: ""
  test:
    required: false
    description: "Run tests"
    default: "true"

outputs:
  pr-comment:
    description: "Combined PR comment with build status"
    value: ${{ steps.pr-comment-combiner.outputs.result }}

runs:
  using: "composite"
  steps:
  - name: Create temp directory
    id: temp-dir
    shell: bash
    run: |
      TEMP_DIR=$(mktemp -d)
      echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

  - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
    name: Set up Node
    with:
      node-version: ${{ inputs.node_version }}
      cache: "npm"
      cache-dependency-path: "${{ inputs.working_directory }}/package-lock.json"
      scope: ${{ inputs.scope }}

  - name: Add GitHub token to .npmrc
    working-directory: ${{ inputs.working_directory }}
    shell: bash
    run: touch ./.npmrc && echo -e "\n//npm.pkg.github.com/:_authToken=${{ inputs.github_token }}" >> ./.npmrc

  - name: Install dependencies
    id: dependency-install
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Install dependencies"
      set +e
      npm ci 1>$TEMP_DIR/dependency.out 2>&1
      exit_code=$?
      echo "Dependency installation exit code: $exit_code"
      set -e

      echo -e "\nDependency installation output:\n"
      cat $TEMP_DIR/dependency.out

      if [[ $exit_code -ne 0 ]]
      then
        echo "::error::Dependency installation failed."
        echo "## ❌ Dependency installation failed:" > $TEMP_DIR/dependency.md
        cat $TEMP_DIR/dependency.out >> $TEMP_DIR/dependency.md
        exit 1
      else
        echo "## ✅ Dependency installation succeeded" > $TEMP_DIR/dependency.md
        cat $TEMP_DIR/dependency.out | grep "packages in" >> $TEMP_DIR/dependency.md
      fi
      echo "::endgroup::"

  - name: Restore .npmrc
    working-directory: ${{ inputs.working_directory }}
    shell: bash
    run: |
      if git ls-files --error-unmatch .npmrc > /dev/null 2>&1; then
        git checkout HEAD -- .npmrc
      else
        rm -f .npmrc || true
      fi

  - name: Typecheck
    id: node-typecheck
    if: steps.dependency-install.outcome == 'success'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      NODE_DISABLE_COLORS: 1
    run: |
      echo "::group::Typecheck"
      if ! node -e "const s=require('./package.json').scripts; process.exit(s && s.typecheck ? 0 : 1)"; then
        echo "Script 'typecheck' not found in package.json, skipping"
        echo "## ⚠️ Script 'typecheck' not found in package.json, skipping" > $TEMP_DIR/typecheck.md
        echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/typecheck.md)"$'\n'EOF >> $GITHUB_OUTPUT
        echo "::endgroup::"
        exit 0
      fi
      set +e
      npm run typecheck 1>$TEMP_DIR/typecheck.out 2>&1 || (exit 0)
      TYPECHECK_EXIT_CODE=$?
      echo "Typecheck exit code: $TYPECHECK_EXIT_CODE"
      set -e

      echo -e "\nTypecheck result:\n"
      cat $TEMP_DIR/typecheck.out

      sed 's/\x1b\[[0-9;]*m//g' $TEMP_DIR/typecheck.out > $TEMP_DIR/typecheck.out.nocolor
      echo -e "\nTypecheck result without colors:\n"
      cat $TEMP_DIR/typecheck.out.nocolor

      # Extract errors from typecheck output - support multiple error formats

      # Format 1: TypeScript new format: file:line:column - error message
      grep -E ".+:[0-9]+:[0-9]+ - error " $TEMP_DIR/typecheck.out.nocolor > $TEMP_DIR/typecheck.err.ts_new || (exit 0)

      # Format 2: TypeScript old format: file(line,column): error message
      grep "): error " $TEMP_DIR/typecheck.out.nocolor > $TEMP_DIR/typecheck.err.ts_old || (exit 0)

      # Format 3: Generic errors: Error: ...
      grep -E "Error: " $TEMP_DIR/typecheck.out.nocolor > $TEMP_DIR/typecheck.err.generic || (exit 0)

      # Combine all error formats
      cat $TEMP_DIR/typecheck.err.ts_new $TEMP_DIR/typecheck.err.ts_old $TEMP_DIR/typecheck.err.generic > $TEMP_DIR/typecheck.err 2>/dev/null || (exit 0)

      echo -e "\nExtracted typecheck errors:\n"
      cat $TEMP_DIR/typecheck.err

      if [ ! -s $TEMP_DIR/typecheck.err ]
      then
        echo "## ✅ Typecheck succeeded" > $TEMP_DIR/typecheck.md
      else
        # Process all error formats
        cat $TEMP_DIR/typecheck.err | while read line
        do
          # Format 1: TypeScript new format: file:line:column - error message
          ts_new_regex="(.+):([0-9]+):[0-9]+ - error (.+)"
          
          # Format 2: TypeScript old format: file(line,column): error message
          ts_old_regex="(.+)\(([0-9]+),[0-9]+\): error (.+)"
          
          # Format 3: Generic error: Error: ...
          generic_error_regex="Error: (.+)"
          
          if [[ $line =~ $ts_new_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[3]}"
          elif [[ $line =~ $ts_old_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[3]}"
          elif [[ $line =~ $generic_error_regex ]]; then
            # For generic errors, we don't create GitHub annotations since we don't have file/line info
            # The error will still appear in the markdown output below
            :
          fi
        done

        cp $TEMP_DIR/typecheck.err $TEMP_DIR/typecheck.md
        sed -i '/^$/d' $TEMP_DIR/typecheck.md             # removes empty lines
        sed -i -e 's/^/- ❌ /' $TEMP_DIR/typecheck.md     # prefix with markdown list item and cross mark emoji
        echo "## ❌ The following typecheck errors should be fixed:" | cat - $TEMP_DIR/typecheck.md > $TEMP_DIR/typecheck.md.temp && mv $TEMP_DIR/typecheck.md.temp $TEMP_DIR/typecheck.md
      fi

      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/typecheck.md)"$'\n'EOF >> $GITHUB_OUTPUT

      if [ -s $TEMP_DIR/typecheck.err ]
      then
        echo "::endgroup::"
        echo "❌ Typecheck failed"
        exit 1
      fi
      echo "::endgroup::"
      echo "✅ Typecheck succeeded"

  - name: Build
    id: node-build
    if: steps.dependency-install.outcome == 'success'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      NODE_DISABLE_COLORS: 1
    run: |
      echo "::group::Build"
      if ! node -e "const s=require('./package.json').scripts; process.exit(s && s.build ? 0 : 1)"; then
        echo "Script 'build' not found in package.json, skipping"
        echo "## ⚠️ Script 'build' not found in package.json, skipping" > $TEMP_DIR/build.md
        echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/build.md)"$'\n'EOF >> $GITHUB_OUTPUT
        echo "::endgroup::"
        exit 0
      fi
      npm run build 1>$TEMP_DIR/build.out 2>&1 || (exit 0)
      echo -e "\nBuild result:\n"
      cat $TEMP_DIR/build.out

      sed 's/\x1b\[[0-9;]*m//g' $TEMP_DIR/build.out > $TEMP_DIR/build.out.nocolor
      echo -e "\nBuild result without colors:\n"
      cat $TEMP_DIR/build.out.nocolor

      # Extract errors from build output - support multiple error formats

      # Format 1: TypeScript new format: file:line:column - error message
      grep -E ".+:[0-9]+:[0-9]+ - error " $TEMP_DIR/build.out.nocolor > $TEMP_DIR/build.err.ts_new || (exit 0)

      # Format 2: TypeScript old format: file(line,column): error message
      grep "): error " $TEMP_DIR/build.out.nocolor > $TEMP_DIR/build.err.ts_old || (exit 0)

      # Format 3: Generic errors: Error: ...
      grep -E "Error: " $TEMP_DIR/build.out.nocolor > $TEMP_DIR/build.err.generic || (exit 0)

      # Combine all error formats
      cat $TEMP_DIR/build.err.ts_new $TEMP_DIR/build.err.ts_old $TEMP_DIR/build.err.generic > $TEMP_DIR/build.err 2>/dev/null || (exit 0)

      # Extract warnings (e.g. bundler warnings)
      grep -iE "Warning:|\[.*\]\[Warning\]" $TEMP_DIR/build.out.nocolor > $TEMP_DIR/build.warn || (exit 0)

      echo -e "\nExtracted build errors:\n"
      cat $TEMP_DIR/build.err
      echo -e "\nExtracted build warnings:\n"
      cat $TEMP_DIR/build.warn
      echo -e "\n"

      if [ ! -s $TEMP_DIR/build.err ]
      then
        echo "## ✅ Build succeeded" > $TEMP_DIR/build.md
      else
        # Process all error formats
        cat $TEMP_DIR/build.err | while read line
        do
          # Format 1: TypeScript new format: file:line:column - error message
          ts_new_regex="(.+):([0-9]+):[0-9]+ - error (.+)"
          
          # Format 2: TypeScript old format: file(line,column): error message
          ts_old_regex="(.+)\(([0-9]+),[0-9]+\): error (.+)"
          
          # Format 3: Generic error: Error: ...
          generic_error_regex="Error: (.+)"
          
          if [[ $line =~ $ts_new_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[3]}"
          elif [[ $line =~ $ts_old_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[3]}"
          elif [[ $line =~ $generic_error_regex ]]; then
            # For generic errors, we don't create GitHub annotations since we don't have file/line info
            # The error will still appear in the markdown output below
            :
          fi
        done

        cp $TEMP_DIR/build.err $TEMP_DIR/build.md
        sed -i '/^$/d' $TEMP_DIR/build.md             # removes empty lines
        sed -i -e 's/^/- ❌ /' $TEMP_DIR/build.md     # prefix with markdown list item and cross mark emoji
        echo "## ❌ The following build errors should be fixed:" | cat - $TEMP_DIR/build.md > $TEMP_DIR/build.md.temp && mv $TEMP_DIR/build.md.temp $TEMP_DIR/build.md
      fi

      # Process warnings - emit GitHub annotations and append to markdown
      if [ -s $TEMP_DIR/build.warn ]; then
        while IFS= read -r line; do
          echo "::warning::$line"
        done < $TEMP_DIR/build.warn
        echo "" >> $TEMP_DIR/build.md
        echo "## ⚠️ Build warnings:" >> $TEMP_DIR/build.md
        sed -i '/^$/d' $TEMP_DIR/build.warn
        sed -e 's/^/- ⚠️ /' $TEMP_DIR/build.warn >> $TEMP_DIR/build.md
      fi

      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/build.md)"$'\n'EOF >> $GITHUB_OUTPUT

      if [ -s $TEMP_DIR/build.err ]
      then
        echo "::endgroup::"
        echo "❌ Build failed"
        exit 1
      fi
      echo "::endgroup::"
      echo "✅ Build succeeded"

  - name: Run extra command
    if: steps.dependency-install.outcome == 'success' && inputs.extra_command != ''
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Extra command"
      ${{ inputs.extra_command }}
      echo "::endgroup::"
      if [ $? -ne 0 ]; then
        echo "::error::Extra command failed. Check the PR comment or job summary for details."
        exit 1
      fi

  - name: Lint
    if: steps.dependency-install.outcome == 'success'
    id: node-lint
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      WORKFLOW_AGENT_PATH: "${{ github.workspace }}/"
    run: |
      echo "::group::Lint"
      if ! node -e "const s=require('./package.json').scripts; process.exit(s && s['lint:ci'] ? 0 : 1)"; then
        echo "Script 'lint:ci' not found in package.json, skipping"
        echo "## ⚠️ Script 'lint:ci' not found in package.json, skipping" > $TEMP_DIR/lint.md
        echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/lint.md)"$'\n'EOF >> $GITHUB_OUTPUT
        echo "::endgroup::"
        exit 0
      fi
      set +e
      npm run lint:ci -- --output-file $TEMP_DIR/eslint.json 2>$TEMP_DIR/lint.err || (exit 0)
      LINT_EXIT_CODE=$?
      echo "Lint exit code: $LINT_EXIT_CODE"
      set -e

      echo -e "\n::group::Lint result\n"
      cat $TEMP_DIR/eslint.json
      echo -e "\n::endgroup::\n"

      LINT_FAILED=0

      # Check if there were errors during linting process
      if [ -s $TEMP_DIR/lint.err ]
      then
        echo -e "\nErrors during linting:\n"
        cat $TEMP_DIR/lint.err
        echo "::error::Errors during linting, see output above."
        echo "## ❌ Errors during linting:" > $TEMP_DIR/lint.md
        cat $TEMP_DIR/lint.err >> $TEMP_DIR/lint.md
        LINT_FAILED=1
      else
        if [ ! -s $TEMP_DIR/eslint.json ] || [ "$(cat $TEMP_DIR/eslint.json)" = "[]" ]
        then
          echo "## ✅ No lint issues 🎊" > $TEMP_DIR/lint.md
        else
          # Check if there are any actual lint errors/warnings
          ERROR_COUNT=$(jq '[.[] | select(.errorCount > 0 or .warningCount > 0)] | length' $TEMP_DIR/eslint.json 2>/dev/null || echo "0")
          
          if [ "$ERROR_COUNT" = "0" ]
          then
            echo "## ✅ No lint issues 🎊" > $TEMP_DIR/lint.md
          else
            # Parse JSON and create GitHub error annotations
            echo "## ❌ The following lint issues should be fixed:" > $TEMP_DIR/lint.md
            LINT_FAILED=1

            echo "WORKFLOW_AGENT_PATH: ${{ env.WORKFLOW_AGENT_PATH }}"
            
            # Use jq to parse JSON and create annotations
            if command -v jq >/dev/null 2>&1; then
              # Create GitHub error annotations (severity 2)
              jq -r '.[] | select(.messages | length > 0) | .filePath as $file | .messages[] | select(.severity == 2) | "::error file=" + ($file | sub("${{ env.WORKFLOW_AGENT_PATH }}"; "")) + ",line=" + (.line | tostring) + ",col=" + (.column | tostring) + "::" + .message + " (\(.ruleId // "unknown"))"' $TEMP_DIR/eslint.json 2>/dev/null || true
              # Create GitHub warning annotations (severity 1)
              jq -r '.[] | select(.messages | length > 0) | .filePath as $file | .messages[] | select(.severity == 1) | "::warning file=" + ($file | sub("${{ env.WORKFLOW_AGENT_PATH }}"; "")) + ",line=" + (.line | tostring) + ",col=" + (.column | tostring) + "::" + .message + " (\(.ruleId // "unknown"))"' $TEMP_DIR/eslint.json 2>/dev/null || true
              
              # Create markdown output for PR comment (errors first, then warnings)
              jq -r '.[] | select(.messages | length > 0) | .filePath as $file | .messages[] | select(.severity == 2) | "- ❌ " + ($file | sub("${{ env.WORKFLOW_AGENT_PATH }}"; "") | sub(".*/"; "")) + ":" + (.line | tostring) + ":" + (.column | tostring) + " - " + .message + " (\(.ruleId // "unknown"))"' $TEMP_DIR/eslint.json >> $TEMP_DIR/lint.md 2>/dev/null || true
              jq -r '.[] | select(.messages | length > 0) | .filePath as $file | .messages[] | select(.severity == 1) | "- ⚠️ " + ($file | sub("${{ env.WORKFLOW_AGENT_PATH }}"; "") | sub(".*/"; "")) + ":" + (.line | tostring) + ":" + (.column | tostring) + " - " + .message + " (\(.ruleId // "unknown"))"' $TEMP_DIR/eslint.json >> $TEMP_DIR/lint.md 2>/dev/null || true
            else
              # Fallback if jq is not available
              echo "jq not available, showing raw JSON output" >> $TEMP_DIR/lint.md
              cat $TEMP_DIR/eslint.json >> $TEMP_DIR/lint.md
            fi
          fi
        fi
      fi

      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/lint.md)"$'\n'EOF >> $GITHUB_OUTPUT

      # Final check - fail the step if any lint issues were found
      if [ "$LINT_FAILED" = "1" ]
      then
        echo "::endgroup::"
        echo "::error::Lint issues found"
        exit 1
      fi

      echo "::endgroup::"
      echo "✅ No lint errors found"

  - name: Run tests
    id: test-coverage
    if: steps.dependency-install.outcome == 'success' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      if ! node -e "const s=require('./package.json').scripts; process.exit(s && s['coverage:ci'] ? 0 : 1)"; then
        echo "Script 'coverage:ci' not found in package.json, skipping"
        echo "tests_ran=false" >> $GITHUB_OUTPUT
        exit 0
      fi
      echo "tests_ran=true" >> $GITHUB_OUTPUT

      echo "::group::Tests (npm run coverage:ci)"
      set +e
      npm run coverage:ci > "$TEMP_DIR/tests.out" 2>&1
      TEST_EXIT_CODE=$?
      set -e
      echo "Tests exit code: $TEST_EXIT_CODE"
      echo "::endgroup::"

      # Always expose failures in the PR comment (later steps may be skipped on failure).
      if [ "$TEST_EXIT_CODE" -ne 0 ]; then
        echo -e "\n::group::coverage:ci raw output (exit $TEST_EXIT_CODE)\n"
        cat "$TEMP_DIR/tests.out"
        echo "::endgroup::"

        sed 's/\x1b\[[0-9;]*m//g' "$TEMP_DIR/tests.out" > "$TEMP_DIR/tests.out.nocolor" || true

        echo "## ❌ coverage:ci failed (exit code: $TEST_EXIT_CODE)" > "$TEMP_DIR/test-output.md"
        echo "" >> "$TEMP_DIR/test-output.md"
        echo "First 200 lines of output:" >> "$TEMP_DIR/test-output.md"
        echo "" >> "$TEMP_DIR/test-output.md"
        echo "\`\`\`" >> "$TEMP_DIR/test-output.md"
        sed -n '1,200p' "$TEMP_DIR/tests.out.nocolor" >> "$TEMP_DIR/test-output.md"
        echo "\`\`\`" >> "$TEMP_DIR/test-output.md"
      fi

      # Fail the step (and thus the PR build) if tests failed.
      if [ "$TEST_EXIT_CODE" -ne 0 ]; then
        exit "$TEST_EXIT_CODE"
      fi

  - name: Generate test run report
    id: test-markdown-report
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      INPUT: "coverage/json-report.json"
      OUTPUT: "${{ env.TEMP_DIR }}/test-results.md"
    run: |
      echo "::group::Test report"
      if [[ ! -f "$INPUT" ]]; then
        echo "Test report not found ($INPUT), skipping (e.g. coverage:ci script not in package.json)"
        mkdir -p "$(dirname "$OUTPUT")"
        echo "## 🧪 Test results" > "$OUTPUT"
        echo "" >> "$OUTPUT"
        echo "No test report (coverage:ci script not run or report not generated)." >> "$OUTPUT"
        echo "::endgroup::"
        exit 0
      fi

      total=$(jq -r '.numTotalTests // 0' "$INPUT")
      passed=$(jq -r '.numPassedTests // 0' "$INPUT")
      failed=$(jq -r '.numFailedTests // 0' "$INPUT")
      skipped=$(jq -r '.numPendingTests // 0' "$INPUT")
      todo=$(jq -r '.numTodoTests // 0' "$INPUT")
      success=$(jq -r '.success // false' "$INPUT")
      start_time=$(jq -r '.startTime // empty' "$INPUT")
      last_end=$(jq -r '.testResults[-1].endTime // empty' "$INPUT")

      if [[ "$success" == "true" ]]; then
        status="All tests passed"
      elif [[ "$failed" -gt 0 ]]; then
        status="${failed} test(s) failed"
      else
        status="Tests incomplete or skipped"
      fi

      duration_line=""
      if [[ -n "$start_time" && -n "$last_end" ]]; then
        duration_ms=$(jq -r --argjson s "$start_time" --argjson e "$last_end" '($e - $s) | floor' "$INPUT" 2>/dev/null || true)
        if [[ -n "$duration_ms" && "$duration_ms" != "null" ]]; then
          duration_sec=$(echo "scale=2; $duration_ms / 1000" | bc 2>/dev/null || echo "$(( duration_ms / 1000 ))")
          duration_line="**Duration:** ${duration_sec}s"
        fi
      fi

      mkdir -p "$(dirname "$OUTPUT")"
      {
        echo "## 🧪 Test results"
        echo ""
        echo "| Total | Passed | Failed | Skipped | Todo |"
        echo "|-------|--------|--------|---------|------|"
        echo "| $total | $passed | $failed | $skipped | $todo |"
        echo ""
        echo "**Status:** $status"
        [[ -n "$duration_line" ]] && echo "$duration_line"
      } > "$OUTPUT"

      echo "Wrote test results to $OUTPUT"
      echo "::endgroup::"

  - name: Upload test results
    uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true' && !cancelled()
    with:
      name: coverage
      path: ${{ inputs.working_directory }}/coverage

  - name: Test reporter
    uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
    id: test-reporter
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true'
    with:
      name: "Node tests"
      path: "${{ inputs.working_directory }}/coverage/junit-report.xml"
      reporter: jest-junit
      fail-on-error: false

  # - name: 'Report Coverage'
  #   if: always() 
  #   uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2.9.3
  #   with:
  #     json-summary-path: "${{ inputs.working_directory }}/coverage/coverage-final.json"

  - name: Code Coverage Report
    uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true'
    with:
      filename: "${{ inputs.working_directory }}/coverage/cobertura-coverage.xml"
      badge: true
      fail_below_min: false
      format: markdown
      hide_branch_rate: false
      hide_complexity: true
      indicators: true
      output: both
      thresholds: "60 80"
  - name: Move code coverage report to temp folder
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true'
    run: |
      echo "## 📊 Code coverage report" > $TEMP_DIR/code-coverage-results.md
      echo "" >> $TEMP_DIR/code-coverage-results.md
      cat "${GITHUB_WORKSPACE}/code-coverage-results.md" >> $TEMP_DIR/code-coverage-results.md
      rm -f "${GITHUB_WORKSPACE}/code-coverage-results.md"

  - name: Check for uncommitted changes
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "Checking for uncommitted changes..."
      git status --porcelain
      if [ -n "$(git status --porcelain)" ]; then
        echo "::error::Changes in files after restore and build:"
        git status
        git diff
        echo "## ❌ Changes in files after restore and build" > $TEMP_DIR/git-status.md
        echo "" >> $TEMP_DIR/git-status.md
        echo "The following files have changes:" >> $TEMP_DIR/git-status.md
        echo "\`\`\`" >> $TEMP_DIR/git-status.md
        git status --porcelain >> $TEMP_DIR/git-status.md
        echo "\`\`\`" >> $TEMP_DIR/git-status.md
        exit 1
      else
        echo "No changes in files after restore and build were found."
        echo "## ✅ No changes in files after restore and build were found" > $TEMP_DIR/git-status.md
      fi

  - name: Combine output into PR comment
    id: pr-comment-combiner
    if: always()
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "# Node build status (${{ inputs.working_directory }})" > $TEMP_DIR/combined.md
      cat $TEMP_DIR/dependency.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/typecheck.md ] && cat $TEMP_DIR/typecheck.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/build.md ] && cat $TEMP_DIR/build.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/lint.md ] && cat $TEMP_DIR/lint.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/test-output.md ] && cat $TEMP_DIR/test-output.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/test-results.md ] && cat $TEMP_DIR/test-results.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/code-coverage-results.md ] && cat $TEMP_DIR/code-coverage-results.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/git-status.md ] && cat $TEMP_DIR/git-status.md >> $TEMP_DIR/combined.md
      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/combined.md)"$'\n'EOF >> $GITHUB_OUTPUT
      cat $TEMP_DIR/combined.md >> $GITHUB_STEP_SUMMARY

  - name: Fail workflow if one or more tests failed
    if: steps.test-reporter.conclusion == 'failure' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::error::Tests failed. Check test reports for details."
      exit 1
