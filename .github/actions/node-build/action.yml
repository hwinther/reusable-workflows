name: "NPM Build"
description: "Frontend (node/npm) typecheck, build and linting"

inputs:
  node_version:
    required: true
    description: "Node version"
  working_directory:
    required: true
    description: "Working directory for the build, the package.json and package-lock.json files are expected to be in this directory"
  github_token:
    required: true
    description: "GitHub token for access to private npm packages"
  scope:
    required: false 
    description: "Package scope, e.g. '@org'"
    default: ''
  extra_command:
    required: false
    description: "Extra command to run after node build"
    default: ""
  test:
    required: false
    description: "Run tests"
    default: "true"

outputs:
  pr-comment:
    description: "Combined PR comment with build status"
    value: ${{ steps.pr-comment-combiner.outputs.result }}

runs:
  using: "composite"
  steps:
  - name: Create temp directory
    id: temp-dir
    shell: bash
    run: |
      TEMP_DIR=$(mktemp -d)
      echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

  # setup-node writes a runner-managed ~/.npmrc with `//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}`.
  # The token reference is by env var name, so the secret never lands on disk in plaintext.
  - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
    name: Set up Node
    with:
      node-version: ${{ inputs.node_version }}
      cache: "npm"
      cache-dependency-path: "${{ inputs.working_directory }}/package-lock.json"
      scope: ${{ inputs.scope }}
      registry-url: 'https://npm.pkg.github.com'

  - name: Install dependencies
    id: dependency-install
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      NODE_AUTH_TOKEN: ${{ inputs.github_token }}
    run: |
      echo "::group::Install dependencies"
      set +e
      npm ci 1>$TEMP_DIR/dependency.out 2>&1
      exit_code=$?
      echo "Dependency installation exit code: $exit_code"
      set -e

      echo -e "\nDependency installation output:\n"
      cat $TEMP_DIR/dependency.out

      if [[ $exit_code -ne 0 ]]
      then
        echo "::error::Dependency installation failed."
        echo "## ❌ Dependency installation failed:" > $TEMP_DIR/dependency.md
        cat $TEMP_DIR/dependency.out >> $TEMP_DIR/dependency.md
        exit 1
      else
        echo "## ✅ Dependency installation succeeded" > $TEMP_DIR/dependency.md
        cat $TEMP_DIR/dependency.out | grep "packages in" >> $TEMP_DIR/dependency.md
      fi
      echo "::endgroup::"

  # Typecheck: run, then collect errors/warnings into per-tool files for the shared formatter.
  - name: Typecheck
    id: node-typecheck
    if: steps.dependency-install.outcome == 'success'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      NODE_DISABLE_COLORS: 1
    run: |
      echo "::group::Typecheck"
      if ! node -e "const s=require('./package.json').scripts; process.exit(s && s.typecheck ? 0 : 1)"; then
        echo "Script 'typecheck' not found in package.json, skipping"
        echo "## ⚠️ Script 'typecheck' not found in package.json, skipping" > $TEMP_DIR/typecheck.md
        echo "skipped=true" >> $GITHUB_OUTPUT
        echo "::endgroup::"
        exit 0
      fi
      set +e
      npm run typecheck 1>$TEMP_DIR/typecheck.out 2>&1
      TYPECHECK_EXIT_CODE=$?
      set -e
      echo "Typecheck exit code: $TYPECHECK_EXIT_CODE"
      cat $TEMP_DIR/typecheck.out
      echo "::endgroup::"

      sed 's/\x1b\[[0-9;]*m//g' $TEMP_DIR/typecheck.out > $TEMP_DIR/typecheck.out.nocolor

      : > $TEMP_DIR/typecheck.err
      grep -E ".+:[0-9]+:[0-9]+ - error " $TEMP_DIR/typecheck.out.nocolor >> $TEMP_DIR/typecheck.err || true
      grep "): error " $TEMP_DIR/typecheck.out.nocolor >> $TEMP_DIR/typecheck.err || true
      grep -E "Error: " $TEMP_DIR/typecheck.out.nocolor >> $TEMP_DIR/typecheck.err || true

      : > $TEMP_DIR/typecheck.warn
      grep -E ".+:[0-9]+:[0-9]+ - warning " $TEMP_DIR/typecheck.out.nocolor >> $TEMP_DIR/typecheck.warn || true
      grep "): warning " $TEMP_DIR/typecheck.out.nocolor >> $TEMP_DIR/typecheck.warn || true
      grep -E "^Warning: |\bWarning: " $TEMP_DIR/typecheck.out.nocolor >> $TEMP_DIR/typecheck.warn || true

  - name: Format typecheck output
    id: format-typecheck
    if: steps.dependency-install.outcome == 'success' && steps.node-typecheck.outputs.skipped != 'true'
    uses: hwinther/reusable-workflows/.github/actions/_format-output@v1
    with:
      format: ts
      errors_file: ${{ env.TEMP_DIR }}/typecheck.err
      warnings_file: ${{ env.TEMP_DIR }}/typecheck.warn
      out_md: ${{ env.TEMP_DIR }}/typecheck.md
      error_header: "## ❌ The following typecheck errors should be fixed:"
      warning_header: "## ⚠️ Typecheck warnings:"
      success_message: "## ✅ Typecheck succeeded"

  # Build: same shape as typecheck. Build warnings include "Warning:" / "[…][Warning]" bundler output.
  - name: Build
    id: node-build
    if: steps.dependency-install.outcome == 'success'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      NODE_DISABLE_COLORS: 1
    run: |
      echo "::group::Build"
      if ! node -e "const s=require('./package.json').scripts; process.exit(s && s.build ? 0 : 1)"; then
        echo "Script 'build' not found in package.json, skipping"
        echo "## ⚠️ Script 'build' not found in package.json, skipping" > $TEMP_DIR/build.md
        echo "skipped=true" >> $GITHUB_OUTPUT
        echo "::endgroup::"
        exit 0
      fi
      set +e
      npm run build 1>$TEMP_DIR/build.out 2>&1
      BUILD_EXIT_CODE=$?
      set -e
      echo "Build exit code: $BUILD_EXIT_CODE"
      cat $TEMP_DIR/build.out
      echo "::endgroup::"

      sed 's/\x1b\[[0-9;]*m//g' $TEMP_DIR/build.out > $TEMP_DIR/build.out.nocolor

      : > $TEMP_DIR/build.err
      grep -E ".+:[0-9]+:[0-9]+ - error " $TEMP_DIR/build.out.nocolor >> $TEMP_DIR/build.err || true
      grep "): error " $TEMP_DIR/build.out.nocolor >> $TEMP_DIR/build.err || true
      grep -E "Error: " $TEMP_DIR/build.out.nocolor >> $TEMP_DIR/build.err || true

      grep -iE "Warning:|\[.*\]\[Warning\]" $TEMP_DIR/build.out.nocolor > $TEMP_DIR/build.warn || true

  - name: Format build output
    id: format-build
    if: steps.dependency-install.outcome == 'success' && steps.node-build.outputs.skipped != 'true'
    uses: hwinther/reusable-workflows/.github/actions/_format-output@v1
    with:
      format: ts
      errors_file: ${{ env.TEMP_DIR }}/build.err
      warnings_file: ${{ env.TEMP_DIR }}/build.warn
      out_md: ${{ env.TEMP_DIR }}/build.md
      error_header: "## ❌ The following build errors should be fixed:"
      warning_header: "## ⚠️ Build warnings:"
      success_message: "## ✅ Build succeeded"

  - name: Run extra command
    if: steps.dependency-install.outcome == 'success' && inputs.extra_command != ''
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Extra command"
      ${{ inputs.extra_command }}
      echo "::endgroup::"
      if [ $? -ne 0 ]; then
        echo "::error::Extra command failed. Check the PR comment or job summary for details."
        exit 1
      fi

  - name: Lint
    id: node-lint
    if: steps.dependency-install.outcome == 'success'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Lint"
      if ! node -e "const s=require('./package.json').scripts; process.exit(s && s['lint:ci'] ? 0 : 1)"; then
        echo "Script 'lint:ci' not found in package.json, skipping"
        echo "## ⚠️ Script 'lint:ci' not found in package.json, skipping" > $TEMP_DIR/lint.md
        echo "skipped=true" >> $GITHUB_OUTPUT
        echo "::endgroup::"
        exit 0
      fi
      set +e
      npm run lint:ci -- --output-file $TEMP_DIR/eslint.json 2>$TEMP_DIR/lint.err
      LINT_EXIT_CODE=$?
      set -e
      echo "Lint exit code: $LINT_EXIT_CODE"
      cat $TEMP_DIR/eslint.json
      echo "::endgroup::"

      # Fail-fast on errors writing to stderr (e.g. ESLint config errors). The format step
      # below assumes a valid ESLint JSON report.
      if [ -s $TEMP_DIR/lint.err ]; then
        echo "::error::Errors during linting, see output above."
        echo "## ❌ Errors during linting:" > $TEMP_DIR/lint.md
        cat $TEMP_DIR/lint.err >> $TEMP_DIR/lint.md
        echo "lint_runtime_error=true" >> $GITHUB_OUTPUT
      fi

  - name: Format lint output
    id: format-lint
    if: steps.dependency-install.outcome == 'success' && steps.node-lint.outputs.skipped != 'true' && steps.node-lint.outputs.lint_runtime_error != 'true'
    uses: hwinther/reusable-workflows/.github/actions/_format-output@v1
    with:
      format: eslint-json
      errors_file: ${{ env.TEMP_DIR }}/eslint.json
      out_md: ${{ env.TEMP_DIR }}/lint.md
      error_header: "## ❌ The following lint issues should be fixed:"
      warning_header: "## ⚠️ Lint warnings:"
      success_message: "## ✅ No lint issues 🎊"

  - name: Run tests
    id: test-coverage
    if: steps.dependency-install.outcome == 'success' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      if ! node -e "const s=require('./package.json').scripts; process.exit(s && s['coverage:ci'] ? 0 : 1)"; then
        echo "Script 'coverage:ci' not found in package.json, skipping"
        echo "tests_ran=false" >> $GITHUB_OUTPUT
        exit 0
      fi
      echo "tests_ran=true" >> $GITHUB_OUTPUT

      echo "::group::Tests (npm run coverage:ci)"
      set +e
      npm run coverage:ci > "$TEMP_DIR/tests.out" 2>&1
      TEST_EXIT_CODE=$?
      set -e
      echo "Tests exit code: $TEST_EXIT_CODE"
      echo "::endgroup::"

      # Always expose failures in the PR comment (later steps may be skipped on failure).
      if [ "$TEST_EXIT_CODE" -ne 0 ]; then
        echo -e "\n::group::coverage:ci raw output (exit $TEST_EXIT_CODE)\n"
        cat "$TEMP_DIR/tests.out"
        echo "::endgroup::"

        sed 's/\x1b\[[0-9;]*m//g' "$TEMP_DIR/tests.out" > "$TEMP_DIR/tests.out.nocolor" || true

        echo "## ❌ coverage:ci failed (exit code: $TEST_EXIT_CODE)" > "$TEMP_DIR/test-output.md"
        echo "" >> "$TEMP_DIR/test-output.md"
        echo "First 200 lines of output:" >> "$TEMP_DIR/test-output.md"
        echo "" >> "$TEMP_DIR/test-output.md"
        echo "\`\`\`" >> "$TEMP_DIR/test-output.md"
        sed -n '1,200p' "$TEMP_DIR/tests.out.nocolor" >> "$TEMP_DIR/test-output.md"
        echo "\`\`\`" >> "$TEMP_DIR/test-output.md"
      fi

      # Fail the step (and thus the PR build) if tests failed.
      if [ "$TEST_EXIT_CODE" -ne 0 ]; then
        exit "$TEST_EXIT_CODE"
      fi

  - name: Generate test run report
    id: test-markdown-report
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      INPUT: "coverage/json-report.json"
      OUTPUT: "${{ env.TEMP_DIR }}/test-results.md"
    run: |
      echo "::group::Test report"
      if [[ ! -f "$INPUT" ]]; then
        echo "Test report not found ($INPUT), skipping (e.g. coverage:ci script not in package.json)"
        mkdir -p "$(dirname "$OUTPUT")"
        echo "## 🧪 Test results" > "$OUTPUT"
        echo "" >> "$OUTPUT"
        echo "No test report (coverage:ci script not run or report not generated)." >> "$OUTPUT"
        echo "::endgroup::"
        exit 0
      fi

      total=$(jq -r '.numTotalTests // 0' "$INPUT")
      passed=$(jq -r '.numPassedTests // 0' "$INPUT")
      failed=$(jq -r '.numFailedTests // 0' "$INPUT")
      skipped=$(jq -r '.numPendingTests // 0' "$INPUT")
      todo=$(jq -r '.numTodoTests // 0' "$INPUT")
      success=$(jq -r '.success // false' "$INPUT")
      start_time=$(jq -r '.startTime // empty' "$INPUT")
      last_end=$(jq -r '.testResults[-1].endTime // empty' "$INPUT")

      if [[ "$success" == "true" ]]; then
        status="All tests passed"
      elif [[ "$failed" -gt 0 ]]; then
        status="${failed} test(s) failed"
      else
        status="Tests incomplete or skipped"
      fi

      duration_line=""
      if [[ -n "$start_time" && -n "$last_end" ]]; then
        duration_ms=$(jq -r --argjson s "$start_time" --argjson e "$last_end" '($e - $s) | floor' "$INPUT" 2>/dev/null || true)
        if [[ -n "$duration_ms" && "$duration_ms" != "null" ]]; then
          duration_sec=$(echo "scale=2; $duration_ms / 1000" | bc 2>/dev/null || echo "$(( duration_ms / 1000 ))")
          duration_line="**Duration:** ${duration_sec}s"
        fi
      fi

      mkdir -p "$(dirname "$OUTPUT")"
      {
        echo "## 🧪 Test results"
        echo ""
        echo "| Total | Passed | Failed | Skipped | Todo |"
        echo "|-------|--------|--------|---------|------|"
        echo "| $total | $passed | $failed | $skipped | $todo |"
        echo ""
        echo "**Status:** $status"
        [[ -n "$duration_line" ]] && echo "$duration_line"
      } > "$OUTPUT"

      echo "Wrote test results to $OUTPUT"
      echo "::endgroup::"

  - name: Upload test results
    uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true' && !cancelled()
    with:
      name: coverage
      path: ${{ inputs.working_directory }}/coverage

  - name: Test reporter
    uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
    id: test-reporter
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true'
    with:
      name: "Node tests"
      path: "${{ inputs.working_directory }}/coverage/junit-report.xml"
      reporter: jest-junit
      fail-on-error: false

  # - name: 'Report Coverage'
  #   if: always() 
  #   uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2.9.3
  #   with:
  #     json-summary-path: "${{ inputs.working_directory }}/coverage/coverage-final.json"

  - name: Code Coverage Report
    uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true'
    with:
      filename: "${{ inputs.working_directory }}/coverage/cobertura-coverage.xml"
      badge: true
      fail_below_min: false
      format: markdown
      hide_branch_rate: false
      hide_complexity: true
      indicators: true
      output: both
      thresholds: "60 80"
  - name: Move code coverage report to temp folder
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    if: steps.test-coverage.outputs.tests_ran == 'true' && inputs.test == 'true'
    run: |
      {
        echo "<details>"
        echo "<summary>📊 Code coverage report</summary>"
        echo ""
        cat "${GITHUB_WORKSPACE}/code-coverage-results.md"
        echo ""
        echo "</details>"
        echo ""
      } > $TEMP_DIR/code-coverage-results.md
      rm -f "${GITHUB_WORKSPACE}/code-coverage-results.md"

  - name: Check for uncommitted changes
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "Checking for uncommitted changes..."
      git config core.fileMode false
      git -c core.safecrlf=false status --porcelain

      if [ -n "$(git -c core.safecrlf=false status --porcelain)" ]; then
        echo "Found changes, staging files to see if they are normalized away..."
        git add -A

        if [ -n "$(git diff --cached)" ]; then
          echo "::error::Actual content changes in files after install and build:"
          git status
          git diff --cached
          echo "## ❌ Changes in files after install and build" > $TEMP_DIR/git-status.md
          echo "" >> $TEMP_DIR/git-status.md
          echo "The following files have actual changes:" >> $TEMP_DIR/git-status.md
          echo "\`\`\`" >> $TEMP_DIR/git-status.md
          git diff --cached --name-only >> $TEMP_DIR/git-status.md
          echo "\`\`\`" >> $TEMP_DIR/git-status.md
          git reset HEAD
          exit 1
        else
          echo "No actual changes - only line endings or file mode were normalized."
          git reset HEAD
          echo "## ✅ No changes in files after install and build were found" > $TEMP_DIR/git-status.md
        fi
      else
        echo "No changes in files after install and build were found."
        echo "## ✅ No changes in files after install and build were found" > $TEMP_DIR/git-status.md
      fi

  - name: Combine output into PR comment
    id: pr-comment-combiner
    if: always()
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "# Node build status (${{ inputs.working_directory }})" > $TEMP_DIR/combined.md
      cat $TEMP_DIR/dependency.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/typecheck.md ] && cat $TEMP_DIR/typecheck.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/build.md ] && cat $TEMP_DIR/build.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/lint.md ] && cat $TEMP_DIR/lint.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/test-output.md ] && cat $TEMP_DIR/test-output.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/test-results.md ] && cat $TEMP_DIR/test-results.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/code-coverage-results.md ] && cat $TEMP_DIR/code-coverage-results.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/git-status.md ] && cat $TEMP_DIR/git-status.md >> $TEMP_DIR/combined.md
      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/combined.md)"$'\n'EOF >> $GITHUB_OUTPUT
      cat $TEMP_DIR/combined.md >> $GITHUB_STEP_SUMMARY

  - name: Fail workflow on typecheck/build/lint errors
    if: |
      steps.format-typecheck.outputs.failed == 'true'
      || steps.format-build.outputs.failed == 'true'
      || steps.format-lint.outputs.failed == 'true'
      || steps.node-lint.outputs.lint_runtime_error == 'true'
    shell: bash
    run: |
      echo "::error::One or more checks reported errors. See PR comment for details."
      exit 1

  - name: Fail workflow if one or more tests failed
    if: steps.test-reporter.conclusion == 'failure' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::error::Tests failed. Check test reports for details."
      exit 1
