name: "Avgjør pakkeversjon og container image tag"
description: "Avgjør pakkeversjon og container image tag basert på GitVersion"

inputs:
  container_registry:
    description: 'Container registry, f.eks. egenacr.azurecr.io'
    default: 'egenacr.azurecr.io'
  container_image_name:
    description: 'Container image navn, f.eks. mappe/undermappe/frontend'
    default: ''
  override_config:
    description: |
      Overstyring av GitVersion konfigurasjonselementer i YAML format.
      Append-es etter et innebygd default som setter pull-request label til "{BranchName}",
      så consumer-overstyringer for samme nøkkel vinner.
    default: ''
  persist_checkout_credentials:
    description: 'actions/checkout persist-credentials; set true only if a later step in the same job runs git push using this clone.'
    required: false
    default: 'false'

outputs:
  deploy_tag:
    description: "Deploy tag: registry, image navn og tag som skal deployes til miljø"
    value: ${{ steps.determine_version_and_tag_values.outputs.deploy_tag }}
  container_image_tags:
    description: "Registry, image navn og tags som skal pushes til container registry"
    value: ${{ steps.determine_version_and_tag_values.outputs.container_image_tags }}
  image_tags:
    description: "Kun image tags (uten registry og image navn)"
    value: ${{ steps.determine_version_and_tag_values.outputs.image_tags }}
  version:
    description: "Pakkeversjon som skal brukes ved deploy til pakke registry"
    value: ${{ steps.determine_version_and_tag_values.outputs.version }}
  is_alpha:
    description: "Boolsk verdi som indikerer om versjonen er en alpha/prerelease versjon"
    value: ${{ steps.determine_version_and_tag_values.outputs.is_alpha }}
  git_version_major_minor_patch:
    description: "GitVersion Major.Minor.Patch versjon - kan brukes for å debugge eller håndtere unntakstilfeller"
    value: ${{ steps.determine_version_values.outputs.majorMinorPatch }}
  git_version_semver:
    description: "GitVersion SemVer versjon - kan brukes for å debugge eller håndtere unntakstilfeller"
    value: ${{ steps.determine_version_values.outputs.semVer }}

runs:
  using: "composite"
  steps:
  - name: Hent kode
    uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    with:
      fetch-depth: 0
      fetch-tags: true
      persist-credentials: ${{ inputs.persist_checkout_credentials == 'true' }}

  - name: Installer GitVersion
    uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
    with:
      versionSpec: '6.6.x'

  # Pull-request bygg får som standard en label utledet fra source-branchen, slik at
  # container- og pakketagger blir f.eks. "0.20.1-feature-login-fix.2" i stedet for
  # GitVersion-defaulten "0.20.1-PullRequest151.2". Consumer kan overstyre ved å sende
  # sin egen `pull-request:` blokk via `override_config:` (siste blokk vinner).
  - name: Bygg GitVersion override-konfigurasjon
    id: gitversion-override
    shell: bash
    env:
      USER_OVERRIDE: ${{ inputs.override_config }}
    run: |
      DEFAULT_OVERRIDE='branches:
        pull-request:
          label: "{BranchName}"'
      {
        echo 'config<<GITVERSION_OVERRIDE_EOF'
        printf '%s\n' "$DEFAULT_OVERRIDE"
        if [ -n "$USER_OVERRIDE" ]; then
          printf '%s\n' "$USER_OVERRIDE"
        fi
        echo 'GITVERSION_OVERRIDE_EOF'
      } >> "$GITHUB_OUTPUT"

  - name: Finn neste versjon
    id: determine_version_values
    uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
    with:
      overrideConfig: ${{ steps.gitversion-override.outputs.config }}

  - name: Avgjør versjon og tag verdier
    id: determine_version_and_tag_values
    shell: bash
    run: |
      echo "GitVersion MajorMinorPatch: ${{ steps.determine_version_values.outputs.majorMinorPatch }}"
      echo "GitVersion SemVer: ${{ steps.determine_version_values.outputs.semVer }}"

      LATEST_CONTAINER_IMAGE_TAG="${{ inputs.container_registry }}/${{ inputs.container_image_name }}:latest"
      GITVERSION_MAJOR_MINOR_PATCH_TAG="${{ inputs.container_registry }}/${{ inputs.container_image_name }}:${{ steps.determine_version_values.outputs.majorMinorPatch }}"
      GITVERSION_SEMVER_TAG="${{ inputs.container_registry }}/${{ inputs.container_image_name }}:${{ steps.determine_version_values.outputs.semVer }}"

      # `:latest` should only ever point at the most recent stable minor release. We attach
      # it if all three hold:
      #   1. building from a v-prefixed git tag (no main, no feature branches)
      #   2. patch component is 0 (e.g. v2.1.0, NOT v2.1.3 — a hotfix shouldn't move :latest)
      #   3. this tag is the highest stable v-tag in the repo (so a hotfix on an old
      #      release branch can't move :latest backwards)
      INCLUDE_LATEST=false
      if [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
        PATCH=$(echo "${{ steps.determine_version_values.outputs.majorMinorPatch }}" | cut -d. -f3)
        if [ "$PATCH" = "0" ]; then
          CURRENT_TAG="v${{ steps.determine_version_values.outputs.majorMinorPatch }}"
          # Only consider plain vMAJOR.MINOR.PATCH tags — exclude prereleases like v2.0.0-beta1.
          HIGHEST_TAG=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ "$CURRENT_TAG" = "$HIGHEST_TAG" ]; then
            INCLUDE_LATEST=true
          else
            echo "Not tagging latest: current=$CURRENT_TAG, highest=$HIGHEST_TAG"
          fi
        else
          echo "Not tagging latest: patch=$PATCH (only x.x.0 releases get :latest)"
        fi
      fi

      if [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == "main" ]]; then
        if [ -n "${{ inputs.container_image_name }}" ]; then
          echo "deploy_tag=$GITVERSION_MAJOR_MINOR_PATCH_TAG" >> $GITHUB_OUTPUT
          echo "container_image_tags=$GITVERSION_MAJOR_MINOR_PATCH_TAG" >> $GITHUB_OUTPUT
          echo "image_tags=${{ steps.determine_version_values.outputs.majorMinorPatch }}" >> $GITHUB_OUTPUT
          echo "Bruker tag: $GITVERSION_MAJOR_MINOR_PATCH_TAG"
        fi

        echo "version=${{ steps.determine_version_values.outputs.majorMinorPatch }}" >> $GITHUB_OUTPUT
        echo "Setter version til ${{ steps.determine_version_values.outputs.majorMinorPatch }}"
        echo "is_alpha=false" >> $GITHUB_OUTPUT
        echo "Setter is_alpha til false"
      elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
        if [ -n "${{ inputs.container_image_name }}" ]; then
          echo "deploy_tag=$GITVERSION_MAJOR_MINOR_PATCH_TAG" >> $GITHUB_OUTPUT
          if [ "$INCLUDE_LATEST" = "true" ]; then
            echo "container_image_tags=$LATEST_CONTAINER_IMAGE_TAG,$GITVERSION_MAJOR_MINOR_PATCH_TAG" >> $GITHUB_OUTPUT
            echo "image_tags=latest;${{ steps.determine_version_values.outputs.majorMinorPatch }}" >> $GITHUB_OUTPUT
            echo "Bruker tags: $LATEST_CONTAINER_IMAGE_TAG,$GITVERSION_MAJOR_MINOR_PATCH_TAG"
          else
            echo "container_image_tags=$GITVERSION_MAJOR_MINOR_PATCH_TAG" >> $GITHUB_OUTPUT
            echo "image_tags=${{ steps.determine_version_values.outputs.majorMinorPatch }}" >> $GITHUB_OUTPUT
            echo "Bruker tag: $GITVERSION_MAJOR_MINOR_PATCH_TAG"
          fi
        fi

        echo "version=${{ steps.determine_version_values.outputs.majorMinorPatch }}" >> $GITHUB_OUTPUT
        echo "Setter version til ${{ steps.determine_version_values.outputs.majorMinorPatch }}"
        echo "is_alpha=false" >> $GITHUB_OUTPUT
        echo "Setter is_alpha til false"
      else
        if [ -n "${{ inputs.container_image_name }}" ]; then
          # Feature/bugfix branch — bruk SemVer (inkluderer prerelease-label utledet fra
          # branch-navnet, f.eks. "1.2.1-mybranch.5") slik at container-taggen matcher
          # pakkeversjonen og unikt identifiserer hvilken branch byggene kommer fra.
          echo "deploy_tag=$GITVERSION_SEMVER_TAG" >> $GITHUB_OUTPUT
          echo "container_image_tags=$GITVERSION_SEMVER_TAG" >> $GITHUB_OUTPUT
          echo "image_tags=${{ steps.determine_version_values.outputs.semVer }}" >> $GITHUB_OUTPUT
          echo "Bruker tag med prerelease label: $GITVERSION_SEMVER_TAG"
        fi

        echo "version=${{ steps.determine_version_values.outputs.semVer }}" >> $GITHUB_OUTPUT
        echo "Setter version til ${{ steps.determine_version_values.outputs.semVer }}"
        echo "is_alpha=true" >> $GITHUB_OUTPUT
        echo "Setter is_alpha til true"
      fi
