name: "Dotnet Build"
description: "Backend (.NET) build and linting"

inputs:
  dotnet_version:
    required: true
    description: ".NET version"
  working_directory:
    required: true
    description: "Working directory for the build, the solution file is expected to be in this directory"
  solution_file:
    required: true
    description: "Solution file to build, e.g. backend/ProjectName.slnx"
  github_token:
    required: true
    description: "GitHub token for access to private NuGet packages"
  primary_nuget_source:
    required: false
    description: "Primary NuGet source for public packages, e.g. https://pkgs.dev.azure.com/org/_packaging/feed/nuget/v3/index.json"
    default: ""
  extra_nuget_source:
    required: false
    description: "Extra NuGet source for private packages, e.g. https://pkgs.dev.azure.com/org/collection/_packaging/feed/nuget/v3/index.json"
  extra_nuget_source_name:
    required: false
    description: "Name of the extra NuGet source, e.g. 'feed'"
  cache:
    required: false
    description: "Enable NuGet package caching"
    default: "true"
  extra_command:
    required: false
    description: "Extra command to run after dotnet build"
    default: ""
  test:
    required: false
    description: "Run tests"
    default: "true"

outputs:
  pr-comment:
    description: "Combined PR comment with build status"
    value: ${{ steps.pr-comment-combiner.outputs.result }}

runs:
  using: "composite"
  steps:
  - name: Create temp directory
    id: temp-dir
    shell: bash
    run: |
      TEMP_DIR=$(mktemp -d)
      echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

  - name: Install .NET
    uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
    with:
      dotnet-version: ${{ inputs.dotnet_version }}
      source-url: ${{ inputs.primary_nuget_source }}
      cache: ${{ inputs.cache }}
      cache-dependency-path: "${{ inputs.working_directory }}/**/packages.lock.json"
    env:
      NUGET_AUTH_TOKEN: ${{ inputs.github_token }}

  - name: Add extra NuGet source
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    if: inputs.extra_nuget_source != ''
    run: |
      dotnet nuget remove source ${{ inputs.extra_nuget_source_name }} || true
      dotnet nuget add source ${{ inputs.extra_nuget_source }} --name ${{ inputs.extra_nuget_source_name }} --username az --password ${{ inputs.github_token }} --store-password-in-clear-text

  - name: Run dotnet restore
    id: dotnet-restore
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Restore"
      set +e
      dotnet restore ${{ inputs.solution_file }} --locked-mode 2>&1 | tee $TEMP_DIR/restore.out
      set -e
      echo "::endgroup::"

      if git ls-files --error-unmatch nuget.config > /dev/null 2>&1; then
        git checkout HEAD -- nuget.config
      else
        rm -f nuget.config || true
      fi

      # Extract errors (NUxxxx codes + "Failed to restore") and warnings (NU1903 vulnerabilities, etc.)
      : > $TEMP_DIR/restore.err
      grep ": error " $TEMP_DIR/restore.out >> $TEMP_DIR/restore.err || true
      grep "Failed to restore " $TEMP_DIR/restore.out >> $TEMP_DIR/restore.err || true
      grep ": warning " $TEMP_DIR/restore.out > $TEMP_DIR/restore.warn || true

  - name: Format restore output
    id: format-restore
    uses: hwinther/reusable-workflows/.github/actions/_format-output@v1
    with:
      format: nuget
      errors_file: ${{ env.TEMP_DIR }}/restore.err
      warnings_file: ${{ env.TEMP_DIR }}/restore.warn
      out_md: ${{ env.TEMP_DIR }}/restore.md
      error_header: "## ❌ Restore failed"
      warning_header: "## ⚠️ Restore warnings (N total)"

  - name: Build
    id: dotnet-build
    if: steps.format-restore.outputs.failed != 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Build"
      set +e
      dotnet build ${{ inputs.solution_file }} -c Release --no-restore --nologo -consoleLoggerParameters:NoSummary -verbosity:quiet 1>$TEMP_DIR/build.out 2>&1
      set -e
      cat $TEMP_DIR/build.out
      echo "::endgroup::"

      grep "): error " $TEMP_DIR/build.out > $TEMP_DIR/build.err || true
      grep "): warning " $TEMP_DIR/build.out > $TEMP_DIR/build.warn || true

  - name: Format build output
    id: format-build
    if: steps.format-restore.outputs.failed != 'true'
    uses: hwinther/reusable-workflows/.github/actions/_format-output@v1
    with:
      format: csc
      errors_file: ${{ env.TEMP_DIR }}/build.err
      warnings_file: ${{ env.TEMP_DIR }}/build.warn
      out_md: ${{ env.TEMP_DIR }}/build.md
      error_header: "## ❌ The following build errors must be fixed:"
      warning_header: "## ⚠️ Warnings (N total)"
      success_message: "## ✅ Build succeeded"
      path_strip: "${{ github.workspace }}/"

  - name: Run extra command
    if: steps.format-restore.outputs.failed != 'true' && inputs.extra_command != ''
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Extra command"
      ${{ inputs.extra_command }}
      echo "::endgroup::"
      if [ $? -ne 0 ]; then
        echo "::error::Extra command failed. Check the PR comment or job summary for details."
        exit 1
      fi

  - name: Run tests
    id: run-tests
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Test"
      TEST_EXIT_CODE=0
      set +e
      dotnet test --solution ${{ inputs.solution_file }} --no-restore --coverlet --coverlet-output-format cobertura --report-xunit-trx 2>&1 | tee $TEMP_DIR/test.out
      TEST_EXIT_CODE=${PIPESTATUS[0]}
      set -e
      echo "::endgroup::"

      # MSB1001 indicates the project isn't on .NET SDK 10+ or global.json lacks the
      # Microsoft.Testing.Platform runner configuration. Catch it explicitly so the
      # reader gets actionable guidance, not a tail of the dotnet log.
      if [ -f "$TEMP_DIR/test.out" ] && grep -q "MSBUILD : error MSB1001: Unknown switch." "$TEMP_DIR/test.out"; then
        echo "::error::dotnet test failed with 'MSB1001: Unknown switch.'. This usually means the project is not using .NET SDK 10 or higher, or global.json is missing the Microsoft.Testing.Platform test runner configuration (\"test\": { \"runner\": \"Microsoft.Testing.Platform\" })."

        cat << 'EOF' > $TEMP_DIR/tests.md
      ## ❌ Test configuration issue
      dotnet test failed with:
      MSBUILD : error MSB1001: Unknown switch.
      This usually means one of the following:
      - The build is not running on .NET SDK 10 or higher, or
      - Your global.json is missing the Microsoft.Testing.Platform configuration, for example:
      global.json:
      { "sdk": { "version": "10.0.100" }, "test": { "runner": "Microsoft.Testing.Platform" } }
      Update global.json accordingly and re-run the workflow.
      You may also need to add &lt;OutputType&gt;Exe&lt;/OutputType&gt; and matching MTP, coverlet and xunit.v3 packages to your test projects:
      &lt;PackageReference Include="xunit.v3.mtp-v2" Version="3.2.2" /&gt;
      &lt;PackageReference Include="Microsoft.Testing.Platform" Version="2.1.0" /&gt;
      &lt;PackageReference Include="coverlet.MTP" Version="8.0.0" /&gt;
      &lt;PackageReference Include="Microsoft.AspNetCore.Mvc.Testing" Version="10.0.5" /&gt;
      EOF
      elif [ "$TEST_EXIT_CODE" -ne 0 ]; then
        echo "## ❌ Tests failed" > $TEMP_DIR/tests.md
        echo "" >> $TEMP_DIR/tests.md
        if [ -f "$TEMP_DIR/test.out" ]; then
          echo '```' >> $TEMP_DIR/tests.md
          tail -100 "$TEMP_DIR/test.out" >> $TEMP_DIR/tests.md
          echo '```' >> $TEMP_DIR/tests.md
        else
          echo "Tests failed. See job logs for details." >> $TEMP_DIR/tests.md
        fi
      fi

      # Extract test warnings (deduped against build.warn so we don't double-report).
      : > $TEMP_DIR/test.warn
      if [ -f "$TEMP_DIR/test.out" ]; then
        grep "): warning " $TEMP_DIR/test.out > $TEMP_DIR/test.warn.raw || true
        if [ -s $TEMP_DIR/test.warn.raw ]; then
          if [ -s $TEMP_DIR/build.warn ]; then
            grep -vxFf $TEMP_DIR/build.warn $TEMP_DIR/test.warn.raw > $TEMP_DIR/test.warn || true
          else
            cp $TEMP_DIR/test.warn.raw $TEMP_DIR/test.warn
          fi
        fi
      fi

      exit $TEST_EXIT_CODE
    continue-on-error: true

  - name: Format test warnings
    id: format-test-warn
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    uses: hwinther/reusable-workflows/.github/actions/_format-output@v1
    with:
      format: csc
      warnings_file: ${{ env.TEMP_DIR }}/test.warn
      out_md: ${{ env.TEMP_DIR }}/test-warn.md
      warning_header: "## ⚠️ Test warnings (N total)"
      path_strip: "${{ github.workspace }}/"

  - name: Generate test report
    uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
    id: test-reporter
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    with:
      name: "Testreport"
      path: "**/TestResults/*.trx"
      reporter: dotnet-trx
      fail-on-error: false

  - name: Generate test run report
    id: test-markdown-report
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      OUTPUT: "${{ env.TEMP_DIR }}/test-results.md"
    run: |
      echo "::group::Test summary report"
      mkdir -p "$(dirname "$OUTPUT")"

      mapfile -d '' -t TRX_FILES < <(find . -path "*/TestResults/*.trx" -print0 2>/dev/null)
      if [ ${#TRX_FILES[@]} -eq 0 ]; then
        echo "No TRX files found, skipping test summary"
        {
          echo "## 🧪 Test results"
          echo ""
          echo "No test report (no TRX files found)."
        } > "$OUTPUT"
        echo "::endgroup::"
        exit 0
      fi

      total=0; passed=0; failed=0; skipped=0; errors=0
      for f in "${TRX_FILES[@]}"; do
        line=$(grep -oE '<Counters [^/]*/>' "$f" | head -1)
        [ -z "$line" ] && continue
        t=$(echo "$line" | grep -oE 'total="[0-9]+"' | grep -oE '[0-9]+')
        p=$(echo "$line" | grep -oE 'passed="[0-9]+"' | grep -oE '[0-9]+')
        fa=$(echo "$line" | grep -oE 'failed="[0-9]+"' | grep -oE '[0-9]+')
        n=$(echo "$line" | grep -oE 'notExecuted="[0-9]+"' | grep -oE '[0-9]+')
        inc=$(echo "$line" | grep -oE 'inconclusive="[0-9]+"' | grep -oE '[0-9]+')
        err=$(echo "$line" | grep -oE 'error="[0-9]+"' | grep -oE '[0-9]+')
        total=$((total + ${t:-0}))
        passed=$((passed + ${p:-0}))
        failed=$((failed + ${fa:-0}))
        skipped=$((skipped + ${n:-0} + ${inc:-0}))
        errors=$((errors + ${err:-0}))
      done

      if [ $failed -eq 0 ] && [ $errors -eq 0 ]; then
        status="All tests passed"
      elif [ $failed -gt 0 ]; then
        status="${failed} test(s) failed"
      else
        status="${errors} test(s) errored"
      fi

      {
        echo "## 🧪 Test results"
        echo ""
        echo "| Total | Passed | Failed | Skipped |"
        echo "|-------|--------|--------|---------|"
        echo "| $total | $passed | $failed | $skipped |"
        echo ""
        echo "**Status:** $status"
      } > "$OUTPUT"

      echo "Wrote test summary to $OUTPUT"
      echo "::endgroup::"

  - name: Code coverage report
    uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    with:
      filename: "**/coverage.cobertura.*.xml"
      badge: true
      fail_below_min: false
      format: markdown
      hide_branch_rate: false
      hide_complexity: true
      indicators: true
      output: both
      thresholds: "60 80"

  - name: Move code coverage report to temp folder
    shell: bash
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    run: |
      {
        echo "<details>"
        echo "<summary>📊 Code coverage report</summary>"
        echo ""
        cat code-coverage-results.md
        echo ""
        echo "</details>"
        echo ""
      } > $TEMP_DIR/code-coverage-results.md
      rm code-coverage-results.md

  - name: Cache ReportGenerator tool
    id: cache-reportgenerator
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
    with:
      path: ~/.dotnet/tools
      key: ${{ runner.os }}-reportgenerator-5.4.4

  - name: Generate ReportGenerator coverage report
    id: reportgenerator
    shell: bash
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    continue-on-error: true
    run: |
      COVERAGE_REPORT_DIR="$TEMP_DIR/coverage-report"
      echo "::group::ReportGenerator"
      if [ "${{ steps.cache-reportgenerator.outputs.cache-hit }}" != "true" ]; then
        dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.4.4
      fi
      reportgenerator -reports:**/coverage.cobertura.*.xml -targetdir:"$COVERAGE_REPORT_DIR" "-reporttypes:MarkdownSummaryGithub;Html"
      echo "report-path=$COVERAGE_REPORT_DIR" >> $GITHUB_OUTPUT
      echo "::endgroup::"

  - name: Copy ReportGenerator summary to temp folder
    shell: bash
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true'
    run: |
      if [ -f "$TEMP_DIR/coverage-report/SummaryGithub.md" ]; then
        {
          echo "<details>"
          echo "<summary>📊 Coverage report (ReportGenerator)</summary>"
          echo ""
          cat "$TEMP_DIR/coverage-report/SummaryGithub.md"
          echo ""
          echo "</details>"
          echo ""
        } > $TEMP_DIR/reportgenerator-summary.md
      fi

  - name: Upload coverage reports
    uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
    if: steps.format-restore.outputs.failed != 'true' && inputs.test == 'true' && steps.reportgenerator.outcome == 'success'
    with:
      name: coverage-report
      path: ${{ steps.reportgenerator.outputs.report-path }}

  - name: Check for uncommitted changes
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "Checking for uncommitted changes..."
      git config core.fileMode false
      git -c core.safecrlf=false status --porcelain

      if [ -n "$(git -c core.safecrlf=false status --porcelain)" ]; then
        echo "Found changes, staging files to see if they are normalized away..."
        git add -A
        
        if [ -n "$(git diff --cached)" ]; then
          echo "::error::Actual content changes in files after restore and build:"
          git status
          git diff --cached
          echo "## ❌ Changes in files after restore and build" > $TEMP_DIR/git-status.md
          echo "" >> $TEMP_DIR/git-status.md
          echo "The following files have actual changes:" >> $TEMP_DIR/git-status.md
          echo "\`\`\`" >> $TEMP_DIR/git-status.md
          git diff --cached --name-only >> $TEMP_DIR/git-status.md
          echo "\`\`\`" >> $TEMP_DIR/git-status.md
          git reset HEAD
          exit 1
        else
          echo "No actual changes - only line endings or file mode were normalized."
          git reset HEAD
          echo "## ✅ No changes in files after restore and build were found" > $TEMP_DIR/git-status.md
        fi
      else
        echo "No changes in files after restore and build were found."
        echo "## ✅ No changes in files after restore and build were found" > $TEMP_DIR/git-status.md
      fi

  - name: Combine output into single PR comment
    id: pr-comment-combiner
    if: always()
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "# Dotnet build status (${{ inputs.solution_file }})" > $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/restore.md ] && cat $TEMP_DIR/restore.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/build.md ] && cat $TEMP_DIR/build.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/tests.md ] && cat $TEMP_DIR/tests.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/test-warn.md ] && cat $TEMP_DIR/test-warn.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/test-results.md ] && cat $TEMP_DIR/test-results.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/code-coverage-results.md ] && cat $TEMP_DIR/code-coverage-results.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/reportgenerator-summary.md ] && cat $TEMP_DIR/reportgenerator-summary.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/git-status.md ] && cat $TEMP_DIR/git-status.md >> $TEMP_DIR/combined.md
      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/combined.md)"$'\n'EOF >> $GITHUB_OUTPUT
      cat $TEMP_DIR/combined.md >> $GITHUB_STEP_SUMMARY

  - name: Fail workflow on restore or build errors
    if: |
      always()
      && (steps.format-restore.outputs.failed == 'true'
          || steps.format-build.outputs.failed == 'true')
    shell: bash
    run: |
      echo "::error::Restore or build reported errors. See PR comment for details."
      exit 1

  - name: Fail workflow if one or more tests failed
    if: steps.run-tests.outcome == 'failure' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::error::Tests failed. Check test reports for details."
      exit 1
