name: "Dotnet Build"
description: "Backend (.NET) build og linting"
branding:
  icon: 'table'
  color: 'black'

inputs:
  dotnet_version:
    required: true
    description: ".NET versjon"
  dotnet_source_path:
    required: true
    description: "Mappen der .NET koden ligger, f.eks. backend"
  dotnet_solution_file:
    required: true
    description: "Løsningsfilen som skal bygges, f.eks. backend/StorSak.Dokumentmottak.slnx"
  github_token:
    required: true
    description: "GitHub token for å få tilgang til private NuGet pakker"
  dotnet_test_root_path:
    required: true
    description: "Mappen der testprosjektene ligger, f.eks. 'backend/src/Tests'"
  primary_nuget_source:
    required: false
    description: "Primær NuGet kilde for offentlige pakker, f.eks. https://pkgs.dev.azure.com/organisasjon/_packaging/organisasjon/nuget/v3/index.json"
    default: ""
  extra_nuget_source:
    required: false
    description: "Ekstra NuGet kilde for private pakker, f.eks. https://pkgs.dev.azure.com/organisasjon/samling/_packaging/samling/nuget/v3/index.json"
  extra_nuget_source_name:
    required: false
    description: "Navn på den ekstra NuGet kilden, f.eks. 'samling'"

outputs:
  pr-comment:
    description: "Kombinert PR kommentar med byggstatus"
    value: ${{ steps.pr-comment-combiner.outputs.result }}

runs:
  using: "composite"
  steps:
  - name: Installer .NET
    uses: actions/setup-dotnet@v5
    with:
      dotnet-version: ${{ inputs.dotnet_version }}
      source-url: ${{ inputs.primary_nuget_source }}
      cache: true
      cache-dependency-path: "${{ inputs.dotnet_source_path }}/**/packages.lock.json"
    env:
      NUGET_AUTH_TOKEN: ${{ inputs.github_token }}

  - name: Add StorSak Source
    shell: bash
    if: ${{ inputs.extra_nuget_source != '' }}
    run: |
      dotnet nuget remove source ${{ inputs.extra_nuget_source_name }} || true
      dotnet nuget add source ${{ inputs.extra_nuget_source }} --name ${{ inputs.extra_nuget_source_name }} --username az --password ${{ inputs.github_token }} --store-password-in-clear-text

  - name: Kjør dotnet restore
    shell: bash
    run: |
      dotnet restore ${{ inputs.dotnet_solution_file }} --locked-mode
      git checkout -- nuget.config # Fordi vi gjør add og remove source rett over her

  - name: Bygg
    id: dotnet-build
    shell: bash
    env:
      WORKFLOW_AGENT_PATH: "${{ github.workspace }}/"
    run: |
      TEMP_DIR=$(mktemp -d)
      echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

      echo "::group::Bygg"
      dotnet build ${{ inputs.dotnet_solution_file }} -c Release --no-restore --nologo -consoleLoggerParameters:NoSummary -verbosity:quiet 1>$TEMP_DIR/build.out 2>&1 || (exit 0)
      grep "): error " $TEMP_DIR/build.out > $TEMP_DIR/build.err || (exit 0)
      grep "): warning " $TEMP_DIR/build.out > $TEMP_DIR/build.warn || (exit 0)
      cat $TEMP_DIR/build.out
      echo "::endgroup::"

      if [ ! -s $TEMP_DIR/build.err ]
      then
        echo "## ✅ Bygg vellykket" > $TEMP_DIR/build.md
      else
        # Reformat error output as github error annotations
        error_regex="(.+)\(([0-9]+),([0-9]+)\): error (.+) \[(.+)\]"
        # Capture groups: 1=file path 2=line 3=character 4=warn: message 5=project path
        cat $TEMP_DIR/build.err | while read line
        do
          if [[ $line =~ $error_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[4]}"
          fi
        done

        cat $TEMP_DIR/build.err | sed "s|${{ env.WORKFLOW_AGENT_PATH }}|| ; s|${{ env.WORKFLOW_AGENT_PATH }}||" > $TEMP_DIR/build.md
        sed -i '/^$/d' $TEMP_DIR/build.md             # removes empty lines
        sed -i -e 's/^/- ❌ /' $TEMP_DIR/build.md     # prefix with markdown list item and cross mark emoji
        echo "## ❌ Følgende byggefeil må fikses:" | cat - $TEMP_DIR/build.md > $TEMP_DIR/build.md.temp && mv $TEMP_DIR/build.md.temp $TEMP_DIR/build.md
      fi

      # Process warnings
      if [ -s $TEMP_DIR/build.warn ]
      then
        # Count total warnings
        TOTAL_WARNINGS=$(wc -l < $TEMP_DIR/build.warn | tr -d ' ')
        
        # Reformat warning output as github warning annotations
        warning_regex="(.+)\(([0-9]+),([0-9]+)\): warning (.+) \[(.+)\]"
        cat $TEMP_DIR/build.warn | while read line
        do
          if [[ $line =~ $warning_regex ]]; then
            echo "::warning file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[4]}"
          fi
        done

        # Create warnings markdown - show first 10 warnings
        echo "" >> $TEMP_DIR/build.md
        echo "## ⚠️ Advarsler ($TOTAL_WARNINGS totalt)" >> $TEMP_DIR/build.md
        
        if [ $TOTAL_WARNINGS -le 10 ]
        then
          cat $TEMP_DIR/build.warn | sed "s|^Warning: ||; s|${{ env.WORKFLOW_AGENT_PATH }}||g" > $TEMP_DIR/build.warn.md
        else
          head -10 $TEMP_DIR/build.warn | sed "s|^Warning: ||; s|${{ env.WORKFLOW_AGENT_PATH }}||g" > $TEMP_DIR/build.warn.md
          echo "" >> $TEMP_DIR/build.warn.md
          echo "... og $(($TOTAL_WARNINGS - 10)) flere advarsler" >> $TEMP_DIR/build.warn.md
        fi
        
        sed -i '/^$/d' $TEMP_DIR/build.warn.md             # removes empty lines
        sed -i -e 's/^/- ⚠️ /' $TEMP_DIR/build.warn.md     # prefix with markdown list item and warning emoji
        cat $TEMP_DIR/build.warn.md >> $TEMP_DIR/build.md
      fi

      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/build.md)"$'\n'EOF >> $GITHUB_OUTPUT

      if [ -s $TEMP_DIR/build.err ]
      then
        exit 1
      fi

  # - name: Opprett Todo-kommentarer
  #   uses: gkampitakis/github-action-todo-commenter@v1
  #   if: ${{ github.event_name == 'pull_request' }}
  #   with:
  #     github-token: ${{ secrets.GITHUB_TOKEN }}
  #     review-message: "Please take a look :eyes:"
  #     tags: "TODO:,FIXME:,BUG:"

  - name: Kjør tester
    id: run-tests
    shell: bash
    run: |
      dotnet test ${{ inputs.dotnet_solution_file }} --no-restore --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx" /p:CollectCoverage=true /p:CoverletOutput="TestResults/" /p:CoverletOutputFormat=cobertura
    continue-on-error: true

  - name: Lag testrapport
    uses: dorny/test-reporter@v2
    id: test-reporter
    with:
      name: "Dokumentmottak Tests"
      path: "${{ inputs.dotnet_test_root_path }}/**/TestResults/test-results.trx"
      reporter: dotnet-trx
      fail-on-error: false

  - name: Kode dekningsrapport
    uses: irongut/CodeCoverageSummary@v1.3.0
    with:
      filename: "${{ inputs.dotnet_test_root_path }}/**/coverage.cobertura.xml"
      badge: true
      fail_below_min: false
      format: markdown
      hide_branch_rate: false
      hide_complexity: true
      indicators: true
      output: both
      thresholds: "60 80"
  - name: Flytter kode dekningsrapport til midlertidig mappe
    shell: bash
    run: |
      mv code-coverage-results.md $TEMP_DIR/

  - name: Ser etter endringer som ikke er sjekket inn
    shell: bash
    run: |
      echo "Ser etter endringer som ikke er sjekket inn..."
      git config core.fileMode false
      git -c core.safecrlf=false status --porcelain

      if [ -n "$(git -c core.safecrlf=false status --porcelain)" ]; then
        echo "Fant endringer, legger til filer for å se om de normaliseres bort..."
        git add -A
        
        if [ -n "$(git diff --cached)" ]; then
          echo "::error::Reelle innholdsendringer i filer etter restore og build:"
          git status
          git diff --cached
          echo "## ❌ Endringer i filer etter restore og build" > $TEMP_DIR/git-status.md
          echo "" >> $TEMP_DIR/git-status.md
          echo "Følgende filer har reelle endringer:" >> $TEMP_DIR/git-status.md
          echo "\`\`\`" >> $TEMP_DIR/git-status.md
          git diff --cached --name-only >> $TEMP_DIR/git-status.md
          echo "\`\`\`" >> $TEMP_DIR/git-status.md
          git reset HEAD
          exit 1
        else
          echo "Ingen reelle endringer - kun line endings eller file mode ble normalisert."
          git reset HEAD
          echo "## ✅ Ingen endringer i filer etter restore og build ble funnet" > $TEMP_DIR/git-status.md
        fi
      else
        echo "Ingen endringer i filer etter restore og build ble funnet."
        echo "## ✅ Ingen endringer i filer etter restore og build ble funnet" > $TEMP_DIR/git-status.md
      fi

  - name: Kombiner utdata til enkelt PR-kommentar
    id: pr-comment-combiner
    if: always()
    shell: bash
    run: |
      echo "# Byggstatus dotnet (${{ inputs.dotnet_solution_file }})" > $TEMP_DIR/combined.md
      cat $TEMP_DIR/build.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/code-coverage-results.md ] && cat $TEMP_DIR/code-coverage-results.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/git-status.md ] && cat $TEMP_DIR/git-status.md >> $TEMP_DIR/combined.md
      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/combined.md)"$'\n'EOF >> $GITHUB_OUTPUT
      cat $TEMP_DIR/combined.md >> $GITHUB_STEP_SUMMARY

  - name: Gi workflowen status feilet dersom en eller flere tester feilet
    if: steps.run-tests.outcome == 'failure'
    shell: bash
    run: |
      echo "::error::Tests failed. Check test reports for details."
      exit 1
