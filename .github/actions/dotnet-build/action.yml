name: "Dotnet Build"
description: "Backend (.NET) build and linting"

inputs:
  dotnet_version:
    required: true
    description: ".NET version"
  working_directory:
    required: true
    description: "Working directory for the build, the solution file is expected to be in this directory"
  solution_file:
    required: true
    description: "Solution file to build, e.g. backend/ProjectName.slnx"
  github_token:
    required: true
    description: "GitHub token for access to private NuGet packages"
  primary_nuget_source:
    required: false
    description: "Primary NuGet source for public packages, e.g. https://pkgs.dev.azure.com/org/_packaging/feed/nuget/v3/index.json"
    default: ""
  extra_nuget_source:
    required: false
    description: "Extra NuGet source for private packages, e.g. https://pkgs.dev.azure.com/org/collection/_packaging/feed/nuget/v3/index.json"
  extra_nuget_source_name:
    required: false
    description: "Name of the extra NuGet source, e.g. 'feed'"
  cache:
    required: false
    description: "Enable NuGet package caching"
    default: "true"
  extra_command:
    required: false
    description: "Extra command to run after dotnet build"
    default: ""
  test:
    required: false
    description: "Run tests"
    default: "true"

outputs:
  pr-comment:
    description: "Combined PR comment with build status"
    value: ${{ steps.pr-comment-combiner.outputs.result }}

runs:
  using: "composite"
  steps:
  - name: Create temp directory
    id: temp-dir
    shell: bash
    run: |
      TEMP_DIR=$(mktemp -d)
      echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

  - name: Install .NET
    uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
    with:
      dotnet-version: ${{ inputs.dotnet_version }}
      source-url: ${{ inputs.primary_nuget_source }}
      cache: ${{ inputs.cache }}
      cache-dependency-path: "${{ inputs.working_directory }}/**/packages.lock.json"
    env:
      NUGET_AUTH_TOKEN: ${{ inputs.github_token }}

  - name: Add extra NuGet source
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    if: inputs.extra_nuget_source != ''
    run: |
      dotnet nuget remove source ${{ inputs.extra_nuget_source_name }} || true
      dotnet nuget add source ${{ inputs.extra_nuget_source }} --name ${{ inputs.extra_nuget_source_name }} --username az --password ${{ inputs.github_token }} --store-password-in-clear-text

  - name: Run dotnet restore
    id: dotnet-restore
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    continue-on-error: true
    run: |
      echo "::group::Restore"
      dotnet restore ${{ inputs.solution_file }} --locked-mode 2>&1 | tee $TEMP_DIR/restore.out || true
      echo "Restore output:"
      cat $TEMP_DIR/restore.out
      echo "::endgroup::"

      if git ls-files --error-unmatch nuget.config > /dev/null 2>&1; then
        git checkout HEAD -- nuget.config
      else
        rm -f nuget.config || true
      fi

      RESTORE_FAILED=0

      # Extract restore errors and 'Failed to restore' lines (if any)
      grep ": error " $TEMP_DIR/restore.out > $TEMP_DIR/restore.err || true
      grep "Failed to restore " $TEMP_DIR/restore.out > $TEMP_DIR/restore.failed || true

      # If we found any error / failed-restore lines, treat restore as failed
      if [ -s $TEMP_DIR/restore.err ] || [ -s $TEMP_DIR/restore.failed ]; then
        RESTORE_FAILED=1

        # Emit GitHub error annotations for each restore error line
        if [ -s $TEMP_DIR/restore.err ]; then
          while IFS= read -r line
          do
            # Match "<path> : error <CODE>: <message>"
            if [[ "$line" =~ ^(.+)\ :\ error\ ([A-Za-z0-9]+):\ (.*)$ ]]; then
              FILE_PATH="${BASH_REMATCH[1]}"
              ERROR_CODE="${BASH_REMATCH[2]}"
              ERROR_MSG="${BASH_REMATCH[3]}"
              echo "::error file=$FILE_PATH::$ERROR_CODE: $ERROR_MSG"
            fi
          done < $TEMP_DIR/restore.err
        fi

        # Emit generic annotations for any 'Failed to restore' lines
        if [ -s $TEMP_DIR/restore.failed ]; then
          while IFS= read -r line
          do
            echo "::error ::$line"
          done < $TEMP_DIR/restore.failed
        fi
      fi

      if [ $RESTORE_FAILED -ne 0 ]; then
        echo "::error::Restore failed. Check the PR comment or job summary for details."
        echo "## ❌ Restore failed" > $TEMP_DIR/restore.md
        echo "" >> $TEMP_DIR/restore.md
        if [ -s $TEMP_DIR/restore.err ] || [ -s $TEMP_DIR/restore.failed ]; then
          # Combine both error sources for markdown output
          cat $TEMP_DIR/restore.err $TEMP_DIR/restore.failed 2>/dev/null | sed "s|$GITHUB_WORKSPACE/||g" | sed '/^$/d' | sed 's/^/- ❌ /' >> $TEMP_DIR/restore.md
        else
          echo '```' >> $TEMP_DIR/restore.md
          tail -100 $TEMP_DIR/restore.out >> $TEMP_DIR/restore.md
          echo '```' >> $TEMP_DIR/restore.md
        fi
      fi
      exit $RESTORE_FAILED

  - name: Build
    id: dotnet-build
    if: steps.dotnet-restore.outcome == 'success'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    env:
      WORKFLOW_AGENT_PATH: "${{ github.workspace }}/"
    run: |
      echo "::group::Build"
      dotnet build ${{ inputs.solution_file }} -c Release --no-restore --nologo -consoleLoggerParameters:NoSummary -verbosity:quiet 1>$TEMP_DIR/build.out 2>&1 || (exit 0)
      grep "): error " $TEMP_DIR/build.out > $TEMP_DIR/build.err || (exit 0)
      grep "): warning " $TEMP_DIR/build.out > $TEMP_DIR/build.warn || (exit 0)
      cat $TEMP_DIR/build.out
      echo "::endgroup::"

      if [ ! -s $TEMP_DIR/build.err ]
      then
        echo "## ✅ Build succeeded" > $TEMP_DIR/build.md
      else
        # Reformat error output as github error annotations
        error_regex="(.+)\(([0-9]+),([0-9]+)\): error (.+) \[(.+)\]"
        # Capture groups: 1=file path 2=line 3=character 4=warn: message 5=project path
        cat $TEMP_DIR/build.err | while read line
        do
          if [[ $line =~ $error_regex ]]; then
            echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[4]}"
          fi
        done

        cat $TEMP_DIR/build.err | sed "s|${{ env.WORKFLOW_AGENT_PATH }}|| ; s|${{ env.WORKFLOW_AGENT_PATH }}||" > $TEMP_DIR/build.md
        sed -i '/^$/d' $TEMP_DIR/build.md             # removes empty lines
        sed -i -e 's/^/- ❌ /' $TEMP_DIR/build.md     # prefix with markdown list item and cross mark emoji
        echo "## ❌ The following build errors must be fixed:" | cat - $TEMP_DIR/build.md > $TEMP_DIR/build.md.temp && mv $TEMP_DIR/build.md.temp $TEMP_DIR/build.md
      fi

      # Process warnings
      if [ -s $TEMP_DIR/build.warn ]
      then
        # Count total warnings
        TOTAL_WARNINGS=$(wc -l < $TEMP_DIR/build.warn | tr -d ' ')
        
        # Reformat warning output as github warning annotations
        warning_regex="(.+)\(([0-9]+),([0-9]+)\): warning (.+) \[(.+)\]"
        cat $TEMP_DIR/build.warn | while read line
        do
          if [[ $line =~ $warning_regex ]]; then
            echo "::warning file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]}::${BASH_REMATCH[4]}"
          fi
        done

        # Create warnings markdown - show first 10 warnings
        echo "" >> $TEMP_DIR/build.md
        echo "## ⚠️ Warnings ($TOTAL_WARNINGS total)" >> $TEMP_DIR/build.md
        
        if [ $TOTAL_WARNINGS -le 10 ]
        then
          cat $TEMP_DIR/build.warn | sed "s|^Warning: ||; s|${{ env.WORKFLOW_AGENT_PATH }}||g" > $TEMP_DIR/build.warn.md
        else
          head -10 $TEMP_DIR/build.warn | sed "s|^Warning: ||; s|${{ env.WORKFLOW_AGENT_PATH }}||g" > $TEMP_DIR/build.warn.md
          echo "" >> $TEMP_DIR/build.warn.md
          echo "... and $(($TOTAL_WARNINGS - 10)) more warnings" >> $TEMP_DIR/build.warn.md
        fi
        
        sed -i '/^$/d' $TEMP_DIR/build.warn.md             # removes empty lines
        sed -i -e 's/^/- ⚠️ /' $TEMP_DIR/build.warn.md     # prefix with markdown list item and warning emoji
        cat $TEMP_DIR/build.warn.md >> $TEMP_DIR/build.md
      fi

      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/build.md)"$'\n'EOF >> $GITHUB_OUTPUT

      if [ -s $TEMP_DIR/build.err ]
      then
        exit 1
      fi

  - name: Run extra command
    if: steps.dotnet-restore.outcome == 'success' && inputs.extra_command != ''
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Extra command"
      ${{ inputs.extra_command }}
      echo "::endgroup::"
      if [ $? -ne 0 ]; then
        echo "::error::Extra command failed. Check the PR comment or job summary for details."
        exit 1
      fi

  - name: Run tests
    id: run-tests
    if: steps.dotnet-restore.outcome == 'success' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::group::Test"
      TEST_EXIT_CODE=0
      dotnet test --solution ${{ inputs.solution_file }} --no-restore --coverlet --coverlet-output-format cobertura --report-xunit-trx 2>&1 | tee $TEMP_DIR/test.out || TEST_EXIT_CODE=$?
      echo "::endgroup::"
      # --coverlet-exclude-assemblies-without-sources

      # Detect MSBuild "Unknown switch" errors that typically indicate
      # either an incompatible .NET SDK version (< 10) or missing
      # Microsoft.Testing.Platform configuration in global.json.
      if [ -f "$TEMP_DIR/test.out" ] && grep -q "MSBUILD : error MSB1001: Unknown switch." "$TEMP_DIR/test.out"; then
        echo "::error::dotnet test failed with 'MSB1001: Unknown switch.'. This usually means the project is not using .NET SDK 10 or higher, or global.json is missing the Microsoft.Testing.Platform test runner configuration (\"test\": { \"runner\": \"Microsoft.Testing.Platform\" })."

        cat << 'EOF' > $TEMP_DIR/tests.md
      ## ❌ Test configuration issue
      dotnet test failed with:
      MSBUILD : error MSB1001: Unknown switch.
      This usually means one of the following:
      - The build is not running on .NET SDK 10 or higher, or
      - Your global.json is missing the Microsoft.Testing.Platform configuration, for example:
      global.json:
      { "sdk": { "version": "10.0.100" }, "test": { "runner": "Microsoft.Testing.Platform" } }
      Update global.json accordingly and re-run the workflow.
      You may also need to add &lt;OutputType&gt;Exe&lt;/OutputType&gt; and matching MTP, coverlet and xunit.v3 packages to your test projects:
      &lt;PackageReference Include="xunit.v3.mtp-v2" Version="3.2.2" /&gt;
      &lt;PackageReference Include="Microsoft.Testing.Platform" Version="2.1.0" /&gt;
      &lt;PackageReference Include="coverlet.MTP" Version="8.0.0" /&gt;
      &lt;PackageReference Include="Microsoft.AspNetCore.Mvc.Testing" Version="10.0.5" /&gt;
      EOF
      else
        # For other failures, create a generic tests markdown (if tests failed)
        if [ "$TEST_EXIT_CODE" -ne 0 ]; then
          echo "## ❌ Tests failed" > $TEMP_DIR/tests.md
          echo "" >> $TEMP_DIR/tests.md
          if [ -f "$TEMP_DIR/test.out" ]; then
            echo '```' >> $TEMP_DIR/tests.md
            tail -100 "$TEMP_DIR/test.out" >> $TEMP_DIR/tests.md
            echo '```' >> $TEMP_DIR/tests.md
          else
            echo "Tests failed. See job logs for details." >> $TEMP_DIR/tests.md
          fi
        fi
      fi

      exit $TEST_EXIT_CODE
    continue-on-error: true

  - name: TEMP debug
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      find . -type f -name "*cobertura*"
      #ls -la $TEMP_DIR/test-results

  - name: Generate test report
    uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
    id: test-reporter
    if: steps.dotnet-restore.outcome == 'success' && inputs.test == 'true'
    with:
      name: "Testreport"
      path: "**/TestResults/*.trx"
      reporter: dotnet-trx
      fail-on-error: false

  - name: Code coverage report
    uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
    if: steps.dotnet-restore.outcome == 'success' && inputs.test == 'true'
    with:
      filename: "**/coverage.cobertura.*.xml"
      badge: true
      fail_below_min: false
      format: markdown
      hide_branch_rate: false
      hide_complexity: true
      indicators: true
      output: both
      thresholds: "60 80"

  - name: Move code coverage report to temp folder
    shell: bash
    if: steps.dotnet-restore.outcome == 'success' && inputs.test == 'true'
    run: |
      echo "## 📊 Code coverage report" > $TEMP_DIR/code-coverage-results.md
      echo "" >> $TEMP_DIR/code-coverage-results.md
      cat code-coverage-results.md >> $TEMP_DIR/code-coverage-results.md
      rm code-coverage-results.md

  - name: Generate ReportGenerator coverage report
    id: reportgenerator
    shell: bash
    if: steps.dotnet-restore.outcome == 'success' && inputs.test == 'true'
    continue-on-error: true
    run: |
      COVERAGE_REPORT_DIR="$TEMP_DIR/coverage-report"
      echo "::group::ReportGenerator"
      dotnet tool install -g dotnet-reportgenerator-globaltool
      reportgenerator -reports:**/coverage.cobertura.*.xml -targetdir:"$COVERAGE_REPORT_DIR" "-reporttypes:MarkdownSummaryGithub;Html"
      echo "report-path=$COVERAGE_REPORT_DIR" >> $GITHUB_OUTPUT
      echo "::endgroup::"

  - name: Copy ReportGenerator summary to temp folder
    shell: bash
    if: steps.dotnet-restore.outcome == 'success' && inputs.test == 'true'
    run: |
      if [ -f "$TEMP_DIR/coverage-report/SummaryGithub.md" ]; then
        echo "## 📊 Coverage report (ReportGenerator)" > $TEMP_DIR/reportgenerator-summary.md
        echo "" >> $TEMP_DIR/reportgenerator-summary.md
        cat "$TEMP_DIR/coverage-report/SummaryGithub.md" >> $TEMP_DIR/reportgenerator-summary.md
      fi

  - name: Upload coverage reports
    uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
    if: steps.dotnet-restore.outcome == 'success' && inputs.test == 'true' && steps.reportgenerator.outcome == 'success'
    with:
      name: coverage-report
      path: ${{ steps.reportgenerator.outputs.report-path }}

  - name: Check for uncommitted changes
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "Checking for uncommitted changes..."
      git config core.fileMode false
      git -c core.safecrlf=false status --porcelain

      if [ -n "$(git -c core.safecrlf=false status --porcelain)" ]; then
        echo "Found changes, staging files to see if they are normalized away..."
        git add -A
        
        if [ -n "$(git diff --cached)" ]; then
          echo "::error::Actual content changes in files after restore and build:"
          git status
          git diff --cached
          echo "## ❌ Changes in files after restore and build" > $TEMP_DIR/git-status.md
          echo "" >> $TEMP_DIR/git-status.md
          echo "The following files have actual changes:" >> $TEMP_DIR/git-status.md
          echo "\`\`\`" >> $TEMP_DIR/git-status.md
          git diff --cached --name-only >> $TEMP_DIR/git-status.md
          echo "\`\`\`" >> $TEMP_DIR/git-status.md
          git reset HEAD
          exit 1
        else
          echo "No actual changes - only line endings or file mode were normalized."
          git reset HEAD
          echo "## ✅ No changes in files after restore and build were found" > $TEMP_DIR/git-status.md
        fi
      else
        echo "No changes in files after restore and build were found."
        echo "## ✅ No changes in files after restore and build were found" > $TEMP_DIR/git-status.md
      fi

  - name: Combine output into single PR comment
    id: pr-comment-combiner
    if: always()
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "# Dotnet build status (${{ inputs.solution_file }})" > $TEMP_DIR/combined.md
          [ -f $TEMP_DIR/restore.md ] && cat $TEMP_DIR/restore.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/build.md ] && cat $TEMP_DIR/build.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/tests.md ] && cat $TEMP_DIR/tests.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/code-coverage-results.md ] && cat $TEMP_DIR/code-coverage-results.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/reportgenerator-summary.md ] && cat $TEMP_DIR/reportgenerator-summary.md >> $TEMP_DIR/combined.md
      [ -f $TEMP_DIR/git-status.md ] && cat $TEMP_DIR/git-status.md >> $TEMP_DIR/combined.md
      echo "result<<EOF"$'\n'"$(cat $TEMP_DIR/combined.md)"$'\n'EOF >> $GITHUB_OUTPUT
      cat $TEMP_DIR/combined.md >> $GITHUB_STEP_SUMMARY

  - name: Fail workflow if restore failed
    if: always() && steps.dotnet-restore.outcome == 'failure'
    shell: bash
    run: |
      echo "::error::Restore failed. Check the PR comment or job summary for details."
      exit 1

  - name: Fail workflow if one or more tests failed
    if: steps.run-tests.outcome == 'failure' && inputs.test == 'true'
    shell: bash
    working-directory: ${{ inputs.working_directory }}
    run: |
      echo "::error::Tests failed. Check test reports for details."
      exit 1
